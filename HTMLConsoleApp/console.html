<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="default.css">
</head>
<body>
    <div id="status-container">
        <div id="status-bar" style="display: none;"></div>
    </div>
    <div id="scroll-container">
        <div id="content">
            <div id="output"></div>
    <div id="menu-container" style="display: none;">
        <div id="menu-title"></div>
        <div id="menu-items"></div>
    </div>
    <div id="input-line" style="display: none;">
        <span id="prompt">></span>
        <textarea id="input" rows="1"></textarea>
    </div>
    <div id="error-message" style="display: none;"></div>
        </div>
    </div>
    
    <script>
        const output = document.getElementById('output');
        const input = document.getElementById('input');
        const menuContainer = document.getElementById('menu-container');
        const menuTitle = document.getElementById('menu-title');
        const menuItems = document.getElementById('menu-items');
        const errorMessage = document.getElementById('error-message');
        const statusBar = document.getElementById('status-bar');
        
        let menuMode = false;
        let currentMenuData = null;
        let selectedIndex = 0;
        let shouldMarkOldOnNextOutput = false;
        
        function addOutput(text, className = '') {
            // Mark existing output as old only on the first new output after user interaction
            if (shouldMarkOldOnNextOutput) {
                markAllOutputAsOld();
                shouldMarkOldOnNextOutput = false;
            }
            
            const line = document.createElement('div');
            line.className = 'output-line new-output ' + className;
            line.textContent = text;
            output.appendChild(line);
            scrollToBottom();
        }
        
        function addImage(imageName, alignment = 'left', size = 'medium') {
            // Mark existing output as old only on the first new output after user interaction
            if (shouldMarkOldOnNextOutput) {
                markAllOutputAsOld();
                shouldMarkOldOnNextOutput = false;
            }
            
            const img = document.createElement('img');
            img.src = imageName;
            img.className = `console-image console-image-${alignment} console-image-${size} new-output`;
            
            // Set alignment-specific styling
            if (alignment === 'center') {
                const container = document.createElement('div');
                container.className = 'output-line new-output image-container-center';
                container.style.textAlign = 'center';
                container.style.clear = 'both';
                container.style.margin = '10px 0';
                container.appendChild(img);
                output.appendChild(container);
            } else {
                // For left/right alignment, add image directly to output container
                // This allows subsequent text to flow around it
                img.style.float = alignment;
                if (alignment === 'left') {
                    img.style.margin = '0 10px 10px 0';
                } else if (alignment === 'right') {
                    img.style.margin = '0 0 10px 10px';
                }
                
                output.appendChild(img);
            }
            
            scrollToBottom();
        }
        
        function markAllOutputAsOld() {
            // Change all existing output from new-output to old-output
            const allOutputLines = output.querySelectorAll('.output-line');
            allOutputLines.forEach(line => {
                line.classList.remove('new-output');
                line.classList.add('old-output');
            });
        }
        
        function scrollToBottom() {
            window.scrollTo(0, document.body.scrollHeight);
        }
        
        function autoResizeTextArea() {
            input.style.height = 'auto';
            input.style.height = input.scrollHeight + 'px';
            scrollToBottom();
        }
        
        function showPrompt() {
            console.log('showPrompt() called');
            
            // Set flag to mark old output when first new output is added
            shouldMarkOldOnNextOutput = true;
            
            // Always clean up any existing flowing input first
            hidePrompt();
            
            // Add prompt and input directly to output container as flowing text
            const outputContainer = document.getElementById('output');
            
            // Create inline prompt and input that flow like text
            const inputContainer = document.createElement('span');
            inputContainer.id = 'input-container';
            inputContainer.className = 'new-output';
            inputContainer.style.display = 'inline';
            
            // Add prompt as inline text with proper theme styling
            const promptSpan = document.createElement('span');
            promptSpan.className = 'flowing-prompt';
            promptSpan.textContent = '>';
            promptSpan.style.marginRight = '5px';
            
            // Create a contenteditable span that acts like flowing text
            const inputSpan = document.createElement('span');
            inputSpan.id = 'flowing-input';
            inputSpan.className = 'flowing-input';
            inputSpan.contentEditable = true;
            inputSpan.style.outline = 'none';
            inputSpan.style.minWidth = '1px';
            inputSpan.style.display = 'inline';
            inputSpan.style.whiteSpace = 'pre-wrap';
            
            inputContainer.appendChild(promptSpan);
            inputContainer.appendChild(inputSpan);
            
            // Add to output container so it flows naturally around images
            outputContainer.appendChild(inputContainer);
            console.log('Created flowing input container');
            
            // Always hide the original input line to prevent double prompts
            const inputLine = document.getElementById('input-line');
            inputLine.style.display = 'none';
            
            // Set up event handlers for the flowing input
            setupFlowingInputHandlers(inputSpan);
            
            inputSpan.focus();
            console.log('Focused on flowing input');
            scrollPromptIntoView();
        }
        
        function setupFlowingInputHandlers(inputSpan) {
            console.log('Setting up flowing input handlers');
            inputSpan.addEventListener('keydown', function(e) {
                console.log('Key pressed in flowing input:', e.key);
                
                if (menuMode) {
                    handleMenuKeydown(e);
                    return;
                }
                
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    const userText = inputSpan.textContent;
                    console.log('Enter pressed, text:', userText);
                    if (userText.trim()) {
                        // Send input to Swift controller for processing
                        window.webkit.messageHandlers.consoleInput.postMessage(userText);
                    }
                    
                    // Remove the input container
                    const inputContainer = document.getElementById('input-container');
                    if (inputContainer) {
                        inputContainer.remove();
                    }
                }
            });
            
            inputSpan.addEventListener('input', function() {
                hideError(); // Clear any error message when user starts typing
            });
        }
        
        function hidePrompt() {
            // Remove the flowing input container
            const inputContainer = document.getElementById('input-container');
            if (inputContainer) {
                inputContainer.remove();
            }
            
            // Also remove any lingering prompt spans
            const existingPromptSpan = document.getElementById('prompt-span');
            if (existingPromptSpan) {
                existingPromptSpan.remove();
            }
            
            // Hide the original input line
            const inputLine = document.getElementById('input-line');
            if (inputLine) {
                inputLine.style.display = 'none';
            }
        }
        
        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.style.display = 'block';
            scrollErrorIntoView();
        }
        
        function hideError() {
            errorMessage.style.display = 'none';
        }
        
        function scrollErrorIntoView() {
            if (errorMessage.style.display === 'none') return;
            
            const scrollContainer = document.getElementById('scroll-container');
            if (!scrollContainer) return;
            
            const errorRect = errorMessage.getBoundingClientRect();
            const viewportHeight = window.innerHeight;
            const statusBarHeight = statusBar.style.display === 'none' ? 0 : statusBar.offsetHeight;
            const availableHeight = viewportHeight - statusBarHeight;
            const buffer = 60; // Larger buffer to show error text with padding
            
            // Get error position relative to viewport (accounting for status bar)
            const errorTop = errorRect.top - statusBarHeight;
            const errorBottom = errorRect.bottom - statusBarHeight;
            
            // Check if error is below visible area - scroll with extra space
            if (errorBottom > availableHeight - buffer) {
                const scrollAmount = errorBottom - availableHeight + buffer + 20; // Extra margin
                scrollContainer.scrollBy(0, scrollAmount);
            }
            
            // Check if error is above visible area  
            else if (errorTop < buffer) {
                const scrollAmount = buffer - errorTop;
                scrollContainer.scrollBy(0, -scrollAmount);
            }
        }
        
        function scrollPromptIntoView() {
            const inputLine = document.getElementById('input-line');
            if (inputLine.style.display === 'none') return;
            
            const scrollContainer = document.getElementById('scroll-container');
            if (!scrollContainer) return;
            
            const inputRect = inputLine.getBoundingClientRect();
            const viewportHeight = window.innerHeight;
            const statusBarHeight = statusBar.style.display === 'none' ? 0 : statusBar.offsetHeight;
            const availableHeight = viewportHeight - statusBarHeight;
            const buffer = 40; // Buffer to show input prompt with comfortable spacing
            
            // Get input position relative to viewport (accounting for status bar)
            const inputTop = inputRect.top - statusBarHeight;
            const inputBottom = inputRect.bottom - statusBarHeight;
            
            // Check if input prompt is below visible area - scroll with extra space
            if (inputBottom > availableHeight - buffer) {
                const scrollAmount = inputBottom - availableHeight + buffer + 20; // Extra margin
                scrollContainer.scrollBy(0, scrollAmount);
            }
            
            // Check if input prompt is above visible area  
            else if (inputTop < buffer) {
                const scrollAmount = buffer - inputTop;
                scrollContainer.scrollBy(0, -scrollAmount);
            }
        }
        
        function showStatusBar(lines) {
            statusBar.innerHTML = '';
            
            lines.forEach(line => {
                const lineDiv = document.createElement('div');
                lineDiv.className = 'status-line';
                
                line.regions.forEach(region => {
                    const regionSpan = document.createElement('span');
                    regionSpan.className = `status-region status-${region.alignment}`;
                    regionSpan.textContent = region.text;
                    lineDiv.appendChild(regionSpan);
                });
                
                statusBar.appendChild(lineDiv);
            });
            
            statusBar.style.display = 'block';
            updateContentPadding();
        }
        
        function hideStatusBar() {
            statusBar.style.display = 'none';
            updateContentPadding();
        }
        
        function updateContentPadding() {
            const content = document.getElementById('content');
            if (statusBar.style.display === 'none') {
                content.style.paddingTop = '20px';
            } else {
                const statusBarHeight = statusBar.offsetHeight;
                content.style.paddingTop = (statusBarHeight + 20) + 'px';
            }
        }
        
        input.addEventListener('input', function() {
            autoResizeTextArea();
            hideError(); // Clear any error message when user starts typing
        });
        
        input.addEventListener('keydown', function(e) {
            if (menuMode) {
                handleMenuKeydown(e);
                return;
            }
            
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault(); // Prevent new line
                const userText = input.value;
                if (userText.trim()) {
                    // Send input to Swift controller for processing
                    // Note: markAllOutputAsOld() will be called in addOutput() when actual output is added
                    window.webkit.messageHandlers.consoleInput.postMessage(userText);
                }
                input.value = '';
                input.style.height = 'auto';
                input.style.height = '1.4em';
            }
        });
        
        // Add document-level keyboard handling for menu mode
        document.addEventListener('keydown', function(e) {
            if (menuMode) {
                handleMenuKeydown(e);
            }
        });
        
        function handleMenuKeydown(e) {
            // Allow command key combinations to pass through (Cmd+Q, Cmd+W, etc.)
            if (e.metaKey || e.ctrlKey) {
                return;
            }
            
            if (e.key === 'ArrowUp') {
                e.preventDefault();
                e.stopPropagation();
                navigateMenu('up');
            } else if (e.key === 'ArrowDown') {
                e.preventDefault();
                e.stopPropagation();
                navigateMenu('down');
            } else if (e.key === 'Enter') {
                e.preventDefault();
                e.stopPropagation();
                selectMenuItem();
            } else if (e.key === 'Escape') {
                e.preventDefault();
                e.stopPropagation();
                window.webkit.messageHandlers.menuAction.postMessage('CANCEL');
            }
        }
        
        function showMenu(data) {
            // Set flag to mark old output when first new output is added
            shouldMarkOldOnNextOutput = true;
            
            menuMode = true;
            currentMenuData = data;
            selectedIndex = 0;
            
            // Hide input line
            hidePrompt();
            
            // Keep menu in its original position but adjust width for images
            menuContainer.style.display = 'block';
            
            // Set title and render items
            menuTitle.textContent = data.title;
            renderMenuItems();
            
            // Adjust menu width to flow around images after it's fully rendered
            setTimeout(() => {
                adjustMenuWidth();
                scrollMenuIntoView();
            }, 50);
        }
        
        function adjustMenuWidth() {
            const output = document.getElementById('output');
            const content = document.getElementById('content');
            
            if (!menuContainer || menuContainer.style.display === 'none' || !menuMode) {
                console.log('Skipping menu adjustment - menu not active');
                return;
            }
            
            console.log('Adjusting menu width - menu is active');
            
            // Reset menu positioning and width
            menuContainer.style.width = '';
            menuContainer.style.marginLeft = '';
            menuContainer.style.marginRight = '';
            menuContainer.style.position = '';
            menuContainer.style.top = '';
            
            // Force a reflow to get accurate measurements
            menuContainer.offsetHeight;
            
            // Get the content and menu dimensions
            const contentRect = content.getBoundingClientRect();
            const menuRect = menuContainer.getBoundingClientRect();
            
            console.log('Menu position:', menuRect.top, menuRect.bottom, menuRect.width);
            console.log('Content width:', contentRect.width);
            
            // Look for the most recent floated images that could be positioned next to the menu
            const floatedImages = output.querySelectorAll('img');
            console.log('Found images:', floatedImages.length);
            
            let bestImage = null;
            let bestImageRect = null;
            let bestImageFloat = null;
            
            floatedImages.forEach((img, index) => {
                const imgRect = img.getBoundingClientRect();
                const imgFloat = img.style.float;
                
                console.log(`Image ${index}:`, {
                    float: imgFloat,
                    top: imgRect.top,
                    bottom: imgRect.bottom,
                    width: imgRect.width,
                    height: imgRect.height
                });
                
                // Look for images that are positioned near where the menu would appear
                if ((imgFloat === 'left' || imgFloat === 'right') && 
                    imgRect.bottom > menuRect.top - 50) { // Image extends down near menu area
                    bestImage = img;
                    bestImageRect = imgRect;
                    bestImageFloat = imgFloat;
                    console.log(`Using image ${index} as positioning reference`);
                }
            });
            
            if (bestImage && bestImageRect) {
                // Calculate available space next to the image with a small gap
                const gapSize = 15; // Small gap between menu and image
                const availableWidth = contentRect.width - bestImageRect.width - 40 - gapSize; // Account for margins, padding, and gap
                
                if (availableWidth > 200) { // Minimum width check
                    // Find where the input prompt would appear by looking at the last text output
                    const outputLines = output.querySelectorAll('.output-line');
                    let promptTargetTop = bestImageRect.top; // Default to image top
                    
                    if (outputLines.length > 0) {
                        const lastOutputLine = outputLines[outputLines.length - 1];
                        const lastLineRect = lastOutputLine.getBoundingClientRect();
                        // Input prompt would appear after the last line of text
                        promptTargetTop = lastLineRect.bottom;
                        console.log('Last output line bottom:', lastLineRect.bottom);
                    }
                    
                    // Calculate how much to move the menu up to align with where the prompt would be
                    const menuNaturalTop = menuRect.top;
                    const verticalOffset = menuNaturalTop - promptTargetTop;
                    
                    // Use relative positioning to move menu to align with prompt position
                    menuContainer.style.position = 'relative';
                    menuContainer.style.top = -verticalOffset + 'px';
                    menuContainer.style.width = availableWidth + 'px';
                    
                    console.log('Vertical positioning:', {
                        menuNaturalTop,
                        promptTargetTop,
                        verticalOffset,
                        topAdjustment: -verticalOffset
                    });
                    
                    if (bestImageFloat === 'left') {
                        // Image is on left, menu goes to the right with a small gap
                        menuContainer.style.marginLeft = (bestImageRect.width + 20 + gapSize) + 'px'; // 20px image margin + gap
                        menuContainer.style.marginRight = '';
                        console.log(`Positioning menu to right of left-floated image with ${gapSize}px gap, moved up by ${verticalOffset}px`);
                    } else if (bestImageFloat === 'right') {
                        // Image is on right, menu stays on left with reduced width for the gap
                        menuContainer.style.marginLeft = '';
                        menuContainer.style.marginRight = (bestImageRect.width + 20 + gapSize) + 'px'; // 20px image margin + gap
                        console.log(`Positioning menu to left of right-floated image with ${gapSize}px gap, moved up by ${verticalOffset}px`);
                    }
                    
                    console.log('Applied menu adjustments:', {
                        width: availableWidth + 'px',
                        marginLeft: menuContainer.style.marginLeft,
                        marginRight: menuContainer.style.marginRight
                    });
                }
            }
        }
        
        function hideMenu() {
            menuMode = false;
            currentMenuData = null;
            selectedIndex = 0;
            
            // Reset all menu styling and positioning
            menuContainer.style.width = '';
            menuContainer.style.marginLeft = '';
            menuContainer.style.marginRight = '';
            menuContainer.style.position = '';
            menuContainer.style.top = '';
            
            // Hide menu and show input line
            menuContainer.style.display = 'none';
            showPrompt(); // Use showPrompt to properly position input line
        }
        
        function renderMenuItems() {
            if (!currentMenuData) return;
            
            menuItems.innerHTML = '';
            currentMenuData.items.forEach((item, index) => {
                const itemDiv = document.createElement('div');
                
                if (item === '') {
                    // Empty item for spacing
                    itemDiv.className = 'menu-spacer';
                    itemDiv.innerHTML = '&nbsp;'; // Non-breaking space
                } else {
                    itemDiv.className = 'menu-item';
                    if (index === selectedIndex) {
                        itemDiv.classList.add('menu-selected');
                    }
                    itemDiv.textContent = `  ${item}`;
                }
                menuItems.appendChild(itemDiv);
            });
        }
        
        function navigateMenu(direction) {
            if (!currentMenuData) return;
            
            let newIndex = selectedIndex;
            
            if (direction === 'up') {
                do {
                    newIndex = Math.max(0, newIndex - 1);
                } while (newIndex > 0 && currentMenuData.items[newIndex] === '');
            } else if (direction === 'down') {
                do {
                    newIndex = Math.min(currentMenuData.items.length - 1, newIndex + 1);
                } while (newIndex < currentMenuData.items.length - 1 && currentMenuData.items[newIndex] === '');
            }
            
            selectedIndex = newIndex;
            renderMenuItems();
            
            // Scroll selected item into view
            scrollSelectedItemIntoView();
        }
        
        function selectMenuItem() {
            if (!currentMenuData) return;
            
            window.webkit.messageHandlers.menuAction.postMessage(`SELECT:${selectedIndex}`);
        }
        
        function scrollMenuIntoView() {
            if (!menuContainer || menuContainer.style.display === 'none') return;
            
            const scrollContainer = document.getElementById('scroll-container');
            if (!scrollContainer) return;
            
            const menuRect = menuContainer.getBoundingClientRect();
            const viewportHeight = window.innerHeight;
            const statusBarHeight = statusBar.style.display === 'none' ? 0 : statusBar.offsetHeight;
            const availableHeight = viewportHeight - statusBarHeight;
            const buffer = 20;
            
            // Get menu position relative to viewport (accounting for status bar)
            const menuTop = menuRect.top - statusBarHeight;
            const menuBottom = menuRect.bottom - statusBarHeight;
            const menuHeight = menuBottom - menuTop;
            
            // First, try to show the entire menu if it fits
            if (menuHeight <= availableHeight - (2 * buffer)) {
                // Menu can fit entirely - prioritize showing it all
                
                // If menu bottom is clipped, scroll to show bottom
                if (menuBottom > availableHeight - buffer) {
                    const scrollAmount = menuBottom - availableHeight + buffer;
                    scrollContainer.scrollBy(0, scrollAmount);
                }
                // If menu top is clipped, scroll to show top
                else if (menuTop < buffer) {
                    const scrollAmount = buffer - menuTop;
                    scrollContainer.scrollBy(0, -scrollAmount);
                }
            } else {
                // Menu is too large to show entirely - ensure selection is visible
                const selectedItem = menuItems.querySelector('.menu-selected');
                if (selectedItem) {
                    const itemRect = selectedItem.getBoundingClientRect();
                    const itemTop = itemRect.top - statusBarHeight;
                    const itemBottom = itemRect.bottom - statusBarHeight;
                    
                    // Check if selected item is below visible area
                    if (itemBottom > availableHeight - buffer) {
                        const scrollAmount = itemBottom - availableHeight + buffer;
                        scrollContainer.scrollBy(0, scrollAmount);
                    }
                    // Check if selected item is above visible area
                    else if (itemTop < buffer) {
                        const scrollAmount = buffer - itemTop;
                        scrollContainer.scrollBy(0, -scrollAmount);
                    }
                } else {
                    // No selection, default to showing menu top
                    if (menuTop < buffer) {
                        const scrollAmount = buffer - menuTop;
                        scrollContainer.scrollBy(0, -scrollAmount);
                    }
                }
            }
        }
        
        function scrollSelectedItemIntoView() {
            if (!menuContainer || menuContainer.style.display === 'none') return;
            
            const scrollContainer = document.getElementById('scroll-container');
            const selectedItem = menuItems.querySelector('.menu-selected');
            if (!scrollContainer || !selectedItem) return;
            
            const itemRect = selectedItem.getBoundingClientRect();
            const menuRect = menuContainer.getBoundingClientRect();
            const viewportHeight = window.innerHeight;
            const statusBarHeight = statusBar.style.display === 'none' ? 0 : statusBar.offsetHeight;
            const availableHeight = viewportHeight - statusBarHeight;
            const buffer = 20;
            
            // Get positions relative to viewport (accounting for status bar)
            const itemTop = itemRect.top - statusBarHeight;
            const itemBottom = itemRect.bottom - statusBarHeight;
            const menuBottom = menuRect.bottom - statusBarHeight;
            
            // Check if selected item is below the visible area
            if (itemBottom > availableHeight - buffer) {
                // Try to show the menu bottom along with the selection
                const menuBottomScrollAmount = menuBottom - availableHeight + buffer;
                const itemScrollAmount = itemBottom - availableHeight + buffer + 20; // Extra buffer
                
                // Use the larger scroll amount to prioritize showing menu bottom
                const scrollAmount = Math.max(menuBottomScrollAmount, itemScrollAmount);
                scrollContainer.scrollBy(0, scrollAmount);
            }
            
            // Check if selected item is above the visible area  
            else if (itemTop < buffer) {
                const scrollAmount = buffer - itemTop;
                scrollContainer.scrollBy(0, -scrollAmount);
            }
        }
        
        // Focus input when page loads
        window.addEventListener('load', function() {
            const flowingInput = document.getElementById('flowing-input');
            if (flowingInput) {
                flowingInput.focus();
            } else {
                input.focus();
            }
        });
        
        // Maintain focus on input
        document.addEventListener('click', function() {
            const flowingInput = document.getElementById('flowing-input');
            if (flowingInput) {
                flowingInput.focus();
            } else {
                input.focus();
            }
        });
    </script>
</body>
</html>
