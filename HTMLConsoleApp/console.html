<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="default.css">
</head>
<body>
    <div id="status-container">
        <div id="status-bar" style="display: none;"></div>
    </div>
    <div id="scroll-container">
        <div id="content">
            <div id="output"></div>
    <div id="menu-container" style="display: none;">
        <div id="menu-title"></div>
        <div id="menu-items"></div>
    </div>
    <div id="input-line" style="display: none;">
        <span id="prompt">></span>
        <textarea id="input" rows="1"></textarea>
    </div>
    <div id="error-message" style="display: none;"></div>
        </div>
    </div>
    
    <script>
        // Override console.log to send messages to Swift
        const originalConsoleLog = console.log;
        console.log = function(...args) {
            const message = args.map(arg => 
                typeof arg === 'object' ? JSON.stringify(arg) : String(arg)
            ).join(' ');
            
            // Send to Swift
            if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.consoleLog) {
                window.webkit.messageHandlers.consoleLog.postMessage(message);
            }
            
            // Also call original console.log for browser dev tools
            originalConsoleLog.apply(console, args);
        };
        
        const output = document.getElementById('output');
        const input = document.getElementById('input');
        const menuContainer = document.getElementById('menu-container');
        const menuTitle = document.getElementById('menu-title');
        const menuItems = document.getElementById('menu-items');
        const errorMessage = document.getElementById('error-message');
        const statusBar = document.getElementById('status-bar');
        
        let menuMode = false;
        let currentMenuData = null;
        let selectedIndex = 0;
        let shouldMarkOldOnNextOutput = false;
        
        function addOutput(text, className = '') {
            // Mark existing output as old only on the first new output after user interaction
            if (shouldMarkOldOnNextOutput) {
                markAllOutputAsOld();
                shouldMarkOldOnNextOutput = false;
            }
            
            const line = document.createElement('div');
            line.className = 'output-line new-output ' + className;
            line.textContent = text;
            output.appendChild(line);
            scrollToBottom();
            
            // Check text flow clearance after adding output
            checkTextFlowClearance();
        }
        
        function addImage(imageName, alignment = 'left', size = 'medium') {
            // Mark existing output as old only on the first new output after user interaction
            if (shouldMarkOldOnNextOutput) {
                markAllOutputAsOld();
                shouldMarkOldOnNextOutput = false;
            }
            
            const img = document.createElement('img');
            img.src = imageName;
            img.className = `console-image console-image-${alignment} console-image-${size} new-output`;
            
            // Set alignment-specific styling
            if (alignment === 'center') {
                const container = document.createElement('div');
                container.className = 'output-line new-output image-container-center';
                container.style.textAlign = 'center';
                container.style.clear = 'both';
                container.style.margin = '10px 0';
                container.appendChild(img);
                output.appendChild(container);
            } else {
                // For left/right alignment, add image directly to output container
                // This allows subsequent text to flow around it
                img.style.float = alignment;
                if (alignment === 'left') {
                    // Set individual margins to preserve CSS top margin and add indent
                    img.style.marginRight = '17px';
                    img.style.marginBottom = '5px';
                    img.style.marginLeft = '16px';
                } else if (alignment === 'right') {
                    // Set individual margins to preserve CSS top margin and add indent
                    img.style.marginRight = '16px';
                    img.style.marginBottom = '5px';
                    img.style.marginLeft = '12px';
                }
                
                output.appendChild(img);
            }
            
            // Smart scroll to show the new image
            scrollToShowImage(img);
        }
        
        function scrollToShowImage(imageElement) {
            // Wait a moment for the image to be positioned in the DOM
            setTimeout(() => {
                const imageRect = imageElement.getBoundingClientRect();
                const viewportHeight = window.innerHeight;
                const scrollContainer = document.getElementById('scroll-container');
                
                // Calculate where we need to scroll to show the entire image
                const imageTop = imageElement.offsetTop;
                const imageBottom = imageTop + imageElement.offsetHeight;
                const bottomMargin = 20; // Desired margin below the image
                
                // Calculate the ideal scroll position to show the bottom of the image plus margin
                const idealScrollTop = imageBottom + bottomMargin - viewportHeight;
                
                // Check if this would clip the top of the image
                const imageTopInViewport = imageTop - idealScrollTop;
                const topPadding = 20; // Padding from top when showing top
                
                if (imageTopInViewport >= topPadding) {
                    // Image fits entirely with margin - scroll to show the bottom plus margin
                    scrollContainer.scrollTop = idealScrollTop;
                } else {
                    // Image too tall or margin would clip top - scroll to show the top without clipping
                    scrollContainer.scrollTop = imageTop - topPadding;
                }
            }, 50);
        }
        
        function markAllOutputAsOld() {
            // Change all existing output from new-output to old-output
            const allOutputLines = output.querySelectorAll('.output-line');
            allOutputLines.forEach(line => {
                line.classList.remove('new-output');
                line.classList.add('old-output');
            });
            
            // Content stream doesn't need marking since it's just text nodes and images
        }
        
        function scrollToBottom() {
            window.scrollTo(0, document.body.scrollHeight);
        }
        
        function autoResizeTextArea() {
            input.style.height = 'auto';
            input.style.height = input.scrollHeight + 'px';
            scrollToBottom();
        }
        
        function showPrompt() {
            console.log('showPrompt() called');
            
            // Set flag to mark old output when first new output is added
            shouldMarkOldOnNextOutput = true;
            
            // Always clean up any existing flowing input first
            hidePrompt();
            
            // Add prompt and input directly to output container as flowing text
            const outputContainer = document.getElementById('output');
            
            // Create inline prompt and input that flow like text
            const inputContainer = document.createElement('span');
            inputContainer.id = 'input-container';
            inputContainer.className = 'new-output';
            inputContainer.style.display = 'inline';
            
            // Add prompt as inline text with proper theme styling
            const promptSpan = document.createElement('span');
            promptSpan.className = 'flowing-prompt';
            promptSpan.textContent = '>';
            promptSpan.style.marginRight = '5px';
            
            // Create a contenteditable span that acts like flowing text
            const inputSpan = document.createElement('span');
            inputSpan.id = 'flowing-input';
            inputSpan.className = 'flowing-input';
            inputSpan.contentEditable = true;
            inputSpan.style.outline = 'none';
            inputSpan.style.minWidth = '1px';
            inputSpan.style.display = 'inline';
            inputSpan.style.whiteSpace = 'pre-wrap';
            
            inputContainer.appendChild(promptSpan);
            inputContainer.appendChild(inputSpan);
            
            // Add to output container so it flows naturally around images
            outputContainer.appendChild(inputContainer);
            console.log('Created flowing input container');
            
            // Always hide the original input line to prevent double prompts
            const inputLine = document.getElementById('input-line');
            inputLine.style.display = 'none';
            
            // Set up event handlers for the flowing input
            setupFlowingInputHandlers(inputSpan);
            
            inputSpan.focus();
            console.log('Focused on flowing input');
            scrollPromptIntoView();
        }
        
        function setupFlowingInputHandlers(inputSpan) {
            console.log('Setting up flowing input handlers');
            inputSpan.addEventListener('keydown', function(e) {
                console.log('Key pressed in flowing input:', e.key);
                
                if (menuMode) {
                    handleMenuKeydown(e);
                    return;
                }
                
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    const userText = inputSpan.textContent;
                    console.log('Enter pressed, text:', userText);
                    
                    if (userText.trim()) {
                        // Non-empty input - remove container and send to Swift
                        const inputContainer = document.getElementById('input-container');
                        if (inputContainer) {
                            inputContainer.remove();
                        }
                        window.webkit.messageHandlers.consoleInput.postMessage(userText);
                    } else {
                        // Empty input - just clear the input without removing the prompt
                        inputSpan.textContent = '';
                        inputSpan.focus();
                    }
                }
            });
            
            inputSpan.addEventListener('input', function() {
                hideError(); // Clear any error message when user starts typing
            });
        }
        
        function hidePrompt() {
            // Remove the flowing input container
            const inputContainer = document.getElementById('input-container');
            if (inputContainer) {
                inputContainer.remove();
            }
            
            // Also remove any lingering prompt spans
            const existingPromptSpan = document.getElementById('prompt-span');
            if (existingPromptSpan) {
                existingPromptSpan.remove();
            }
            
            // Hide the original input line
            const inputLine = document.getElementById('input-line');
            if (inputLine) {
                inputLine.style.display = 'none';
            }
        }
        
        function showError(message) {
            // Use a small delay to ensure the error appears after the input prompt
            setTimeout(() => {
                const outputContainer = document.getElementById('output');
                
                // Remove any existing flowing error
                const existingError = document.getElementById('flowing-error');
                if (existingError) {
                    existingError.remove();
                }
                
                // Create error as a simple output line with error styling
                const errorLine = document.createElement('div');
                errorLine.id = 'flowing-error';
                errorLine.className = 'output-line new-output';
                errorLine.textContent = message;
                
                // Apply error-specific styling
                errorLine.style.color = getComputedStyle(document.getElementById('error-message')).color;
                errorLine.style.fontStyle = getComputedStyle(document.getElementById('error-message')).fontStyle;
                errorLine.style.fontSize = getComputedStyle(document.getElementById('error-message')).fontSize;
                
                // Add to the end of output container - should now appear after the input
                outputContainer.appendChild(errorLine);
                
                // Auto-hide the error after a delay
                setTimeout(() => {
                    if (errorLine) {
                        errorLine.remove();
                    }
                }, 5000);
                
                scrollToBottom();
            }, 10); // Small delay to let DOM settle
            
            // Hide the original error message
            errorMessage.style.display = 'none';
        }
        
        function hideError() {
            // Hide the original error message
            errorMessage.style.display = 'none';
            
            // Remove any flowing error
            const flowingError = document.getElementById('flowing-error');
            if (flowingError) {
                flowingError.remove();
            }
        }
        
        function scrollErrorIntoView() {
            if (errorMessage.style.display === 'none') return;
            
            const scrollContainer = document.getElementById('scroll-container');
            if (!scrollContainer) return;
            
            const errorRect = errorMessage.getBoundingClientRect();
            const viewportHeight = window.innerHeight;
            const statusBarHeight = statusBar.style.display === 'none' ? 0 : statusBar.offsetHeight;
            const availableHeight = viewportHeight - statusBarHeight;
            const buffer = 60; // Larger buffer to show error text with padding
            
            // Get error position relative to viewport (accounting for status bar)
            const errorTop = errorRect.top - statusBarHeight;
            const errorBottom = errorRect.bottom - statusBarHeight;
            
            // Check if error is below visible area - scroll with extra space
            if (errorBottom > availableHeight - buffer) {
                const scrollAmount = errorBottom - availableHeight + buffer + 20; // Extra margin
                scrollContainer.scrollBy(0, scrollAmount);
            }
            
            // Check if error is above visible area  
            else if (errorTop < buffer) {
                const scrollAmount = buffer - errorTop;
                scrollContainer.scrollBy(0, -scrollAmount);
            }
        }
        
        function scrollPromptIntoView() {
            // Check for flowing input first, then fall back to regular input line
            let inputElement = document.getElementById('input-container');
            const inputLine = document.getElementById('input-line');
            
            if (!inputElement && inputLine.style.display !== 'none') {
                inputElement = inputLine;
            }
            
            if (!inputElement) return;
            
            const scrollContainer = document.getElementById('scroll-container');
            if (!scrollContainer) return;
            
            const inputRect = inputElement.getBoundingClientRect();
            const viewportHeight = window.innerHeight;
            const statusBarHeight = statusBar.style.display === 'none' ? 0 : statusBar.offsetHeight;
            const availableHeight = viewportHeight - statusBarHeight;
            const buffer = 40; // Buffer to show input prompt with comfortable spacing
            
            // Get input position relative to viewport (accounting for status bar)
            const inputTop = inputRect.top - statusBarHeight;
            const inputBottom = inputRect.bottom - statusBarHeight;
            
            // Check if input prompt is below visible area - scroll with extra space
            if (inputBottom > availableHeight - buffer) {
                const scrollAmount = inputBottom - availableHeight + buffer + 20; // Extra margin
                scrollContainer.scrollBy(0, scrollAmount);
            }
            
            // Check if input prompt is above visible area  
            else if (inputTop < buffer) {
                const scrollAmount = buffer - inputTop;
                scrollContainer.scrollBy(0, -scrollAmount);
            }
        }
        
        function showStatusBar(lines) {
            statusBar.innerHTML = '';
            
            lines.forEach(line => {
                const lineDiv = document.createElement('div');
                lineDiv.className = 'status-line';
                
                line.regions.forEach(region => {
                    const regionSpan = document.createElement('span');
                    regionSpan.className = `status-region status-${region.alignment}`;
                    regionSpan.textContent = region.text;
                    lineDiv.appendChild(regionSpan);
                });
                
                statusBar.appendChild(lineDiv);
            });
            
            statusBar.style.display = 'block';
            updateContentPadding();
        }
        
        function hideStatusBar() {
            statusBar.style.display = 'none';
            updateContentPadding();
        }
        
        function updateContentPadding() {
            const content = document.getElementById('content');
            if (statusBar.style.display === 'none') {
                content.style.paddingTop = '20px';
            } else {
                const statusBarHeight = statusBar.offsetHeight;
                content.style.paddingTop = (statusBarHeight + 20) + 'px';
            }
        }
        
        input.addEventListener('input', function() {
            autoResizeTextArea();
            hideError(); // Clear any error message when user starts typing
        });
        
        input.addEventListener('keydown', function(e) {
            if (menuMode) {
                handleMenuKeydown(e);
                return;
            }
            
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault(); // Prevent new line
                const userText = input.value;
                if (userText.trim()) {
                    // Send input to Swift controller for processing
                    // Note: markAllOutputAsOld() will be called in addOutput() when actual output is added
                    window.webkit.messageHandlers.consoleInput.postMessage(userText);
                }
                input.value = '';
                input.style.height = 'auto';
                input.style.height = '1.4em';
            }
        });
        
        // Add document-level keyboard handling for menu mode
        document.addEventListener('keydown', function(e) {
            if (menuMode) {
                handleMenuKeydown(e);
            }
        });
        
        function handleMenuKeydown(e) {
            // Allow command key combinations to pass through (Cmd+Q, Cmd+W, etc.)
            if (e.metaKey || e.ctrlKey) {
                return;
            }
            
            if (e.key === 'ArrowUp') {
                e.preventDefault();
                e.stopPropagation();
                navigateMenu('up');
            } else if (e.key === 'ArrowDown') {
                e.preventDefault();
                e.stopPropagation();
                navigateMenu('down');
            } else if (e.key === 'Enter') {
                e.preventDefault();
                e.stopPropagation();
                selectMenuItem();
            } else if (e.key === 'Escape') {
                e.preventDefault();
                e.stopPropagation();
                window.webkit.messageHandlers.menuAction.postMessage('CANCEL');
            }
        }
        
        function showMenu(data) {
            // Set flag to mark old output when first new output is added
            shouldMarkOldOnNextOutput = true;
            
            menuMode = true;
            currentMenuData = data;
            selectedIndex = 0;
            
            // Hide input line
            hidePrompt();
            
            // Move menu into the output container so it flows inline with text
            const outputContainer = document.getElementById('output');
            outputContainer.appendChild(menuContainer);
            
            // Show menu
            menuContainer.style.display = 'block';
            
            // Set title and render items
            menuTitle.textContent = data.title;
            renderMenuItems();
            
            // Adjust menu width to flow around images after it's fully rendered
            setTimeout(() => {
                adjustMenuWidth();
                scrollMenuIntoView();
            }, 50);
        }
        
        function adjustMenuWidth() {
            // Simple approach: just let the menu flow inline like text with minimal padding from images
            const outputContainer = document.getElementById('output');
            const images = Array.from(outputContainer.querySelectorAll('.console-image'));
            
            if (images.length === 0) {
                // No images - use default flow
                return;
            }
            
            // Add just a small margin to create space between menu and any adjacent images
            // This preserves the inline flow behavior while adding the requested padding
            menuContainer.style.marginLeft = '8px';
            menuContainer.style.marginRight = '8px';
        }
        
        function hideMenu() {
            menuMode = false;
            currentMenuData = null;
            selectedIndex = 0;
            
            // Reset all menu styling and positioning
            menuContainer.style.width = '';
            menuContainer.style.marginLeft = '';
            menuContainer.style.marginRight = '';
            menuContainer.style.position = '';
            menuContainer.style.top = '';
            menuContainer.style.clear = '';
            
            // Hide menu
            menuContainer.style.display = 'none';
            
            // Move menu back to its original position outside output container
            const contentContainer = document.getElementById('content');
            contentContainer.appendChild(menuContainer);
            
            // Show input line
            showPrompt(); // Use showPrompt to properly position input line
        }
        
        function renderMenuItems() {
            if (!currentMenuData) return;
            
            menuItems.innerHTML = '';
            currentMenuData.items.forEach((item, index) => {
                const itemDiv = document.createElement('div');
                
                if (item === '') {
                    // Empty item for spacing
                    itemDiv.className = 'menu-spacer';
                    itemDiv.innerHTML = '&nbsp;'; // Non-breaking space
                } else {
                    itemDiv.className = 'menu-item';
                    if (index === selectedIndex) {
                        itemDiv.classList.add('menu-selected');
                    }
                    itemDiv.textContent = item;
                }
                menuItems.appendChild(itemDiv);
            });
        }
        
        function navigateMenu(direction) {
            if (!currentMenuData) return;
            
            let newIndex = selectedIndex;
            
            if (direction === 'up') {
                do {
                    newIndex = Math.max(0, newIndex - 1);
                } while (newIndex > 0 && currentMenuData.items[newIndex] === '');
            } else if (direction === 'down') {
                do {
                    newIndex = Math.min(currentMenuData.items.length - 1, newIndex + 1);
                } while (newIndex < currentMenuData.items.length - 1 && currentMenuData.items[newIndex] === '');
            }
            
            selectedIndex = newIndex;
            renderMenuItems();
            
            // Scroll selected item into view
            scrollSelectedItemIntoView();
        }
        
        function selectMenuItem() {
            if (!currentMenuData) return;
            
            window.webkit.messageHandlers.menuAction.postMessage(`SELECT:${selectedIndex}`);
        }
        
        function scrollMenuIntoView() {
            if (!menuContainer || menuContainer.style.display === 'none') return;
            
            const scrollContainer = document.getElementById('scroll-container');
            if (!scrollContainer) return;
            
            const menuRect = menuContainer.getBoundingClientRect();
            const viewportHeight = window.innerHeight;
            const statusBarHeight = statusBar.style.display === 'none' ? 0 : statusBar.offsetHeight;
            const availableHeight = viewportHeight - statusBarHeight;
            const buffer = 20;
            
            // Get menu position relative to viewport (accounting for status bar)
            const menuTop = menuRect.top - statusBarHeight;
            const menuBottom = menuRect.bottom - statusBarHeight;
            const menuHeight = menuBottom - menuTop;
            
            // First, try to show the entire menu if it fits
            if (menuHeight <= availableHeight - (2 * buffer)) {
                // Menu can fit entirely - prioritize showing it all
                
                // If menu bottom is clipped, scroll to show bottom
                if (menuBottom > availableHeight - buffer) {
                    const scrollAmount = menuBottom - availableHeight + buffer;
                    scrollContainer.scrollBy(0, scrollAmount);
                }
                // If menu top is clipped, scroll to show top
                else if (menuTop < buffer) {
                    const scrollAmount = buffer - menuTop;
                    scrollContainer.scrollBy(0, -scrollAmount);
                }
            } else {
                // Menu is too large to show entirely - ensure selection is visible
                const selectedItem = menuItems.querySelector('.menu-selected');
                if (selectedItem) {
                    const itemRect = selectedItem.getBoundingClientRect();
                    const itemTop = itemRect.top - statusBarHeight;
                    const itemBottom = itemRect.bottom - statusBarHeight;
                    
                    // Check if selected item is below visible area
                    if (itemBottom > availableHeight - buffer) {
                        const scrollAmount = itemBottom - availableHeight + buffer;
                        scrollContainer.scrollBy(0, scrollAmount);
                    }
                    // Check if selected item is above visible area
                    else if (itemTop < buffer) {
                        const scrollAmount = buffer - itemTop;
                        scrollContainer.scrollBy(0, -scrollAmount);
                    }
                } else {
                    // No selection, default to showing menu top
                    if (menuTop < buffer) {
                        const scrollAmount = buffer - menuTop;
                        scrollContainer.scrollBy(0, -scrollAmount);
                    }
                }
            }
        }
        
        function scrollSelectedItemIntoView() {
            if (!menuContainer || menuContainer.style.display === 'none') return;
            
            const scrollContainer = document.getElementById('scroll-container');
            const selectedItem = menuItems.querySelector('.menu-selected');
            if (!scrollContainer || !selectedItem) return;
            
            const itemRect = selectedItem.getBoundingClientRect();
            const menuRect = menuContainer.getBoundingClientRect();
            const viewportHeight = window.innerHeight;
            const statusBarHeight = statusBar.style.display === 'none' ? 0 : statusBar.offsetHeight;
            const availableHeight = viewportHeight - statusBarHeight;
            const buffer = 20;
            
            // Get positions relative to viewport (accounting for status bar)
            const itemTop = itemRect.top - statusBarHeight;
            const itemBottom = itemRect.bottom - statusBarHeight;
            const menuBottom = menuRect.bottom - statusBarHeight;
            
            // Check if selected item is below the visible area
            if (itemBottom > availableHeight - buffer) {
                // Try to show the menu bottom along with the selection
                const menuBottomScrollAmount = menuBottom - availableHeight + buffer;
                const itemScrollAmount = itemBottom - availableHeight + buffer + 20; // Extra buffer
                
                // Use the larger scroll amount to prioritize showing menu bottom
                const scrollAmount = Math.max(menuBottomScrollAmount, itemScrollAmount);
                scrollContainer.scrollBy(0, scrollAmount);
            }
            
            // Check if selected item is above the visible area  
            else if (itemTop < buffer) {
                const scrollAmount = buffer - itemTop;
                scrollContainer.scrollBy(0, -scrollAmount);
            }
        }
        
        // Focus input when page loads
        window.addEventListener('load', function() {
            const flowingInput = document.getElementById('flowing-input');
            if (flowingInput) {
                flowingInput.focus();
            } else {
                input.focus();
            }
        });
        
        // Maintain focus on input
        document.addEventListener('click', function() {
            const flowingInput = document.getElementById('flowing-input');
            if (flowingInput) {
                flowingInput.focus();
            } else {
                input.focus();
            }
        });
        
        
        // Check if text has flowed below the most recent floating image
        function hasTextFlowedBelowFloatingImages() {
            if (!lastFloatingImage) {
                console.log('DEBUG: No floating image to check, clearance OK');
                return true;
            }
            
            console.log('DEBUG: Checking text flow for most recent floating image');
            
            // Helper function - fixed to compare bottom of text with bottom of image
            function hasTextFlowedBelowFloat(imageElement, textElement) {
                const imageRect = imageElement.getBoundingClientRect();
                const textRect = textElement.getBoundingClientRect();

                // Check if the bottom of the text element is below the bottom of the image
                // This means text has actually filled the space below the image
                if (textRect.bottom > imageRect.bottom) {
                    console.log(`DEBUG: Text bottom (${textRect.bottom}) > Image bottom (${imageRect.bottom}) - clearance detected`);
                    return true; // Text has flowed below the image
                }

                console.log(`DEBUG: Text bottom (${textRect.bottom}) <= Image bottom (${imageRect.bottom}) - no clearance yet`);
                return false; // Text has not flowed below the image
            }
            
            // Only check the most recent floating image against recent text elements
            const textElements = output.querySelectorAll('.output-line');
            
            // Check the last few text elements (much more efficient)
            for (let i = Math.max(0, textElements.length - 3); i < textElements.length; i++) {
                const textElement = textElements[i];
                if (textElement.textContent.trim().length > 0) {
                    if (hasTextFlowedBelowFloat(lastFloatingImage, textElement)) {
                        console.log('DEBUG: Found text below most recent floating image:', textElement.textContent.substring(0, 30));
                        return true;
                    }
                }
            }
            
            console.log('DEBUG: No text found below most recent floating image yet');
            return false;
        }
        
        // Image placement state management (moved from Swift Engine)
        let imagePlacementRestricted = false;
        let imageBottomPosition = 0;
        let lastFloatingImage = null;
        const requiredPixelsAfterClearance = 50;
        
        // Smart image placement with clearance checking
        function checkAndPlaceImage(imageName, alignment, size) {
            // Smart image placement with real-time clearance checking
            if (!imagePlacementRestricted) {
                // Check if we're still in the buffer period after image bottom
                const currentHeight = output.scrollHeight;
                const pixelsSinceImageBottom = imageBottomPosition > 0 ? currentHeight - imageBottomPosition : currentHeight;
                console.log(`DEBUG: IMAGE PLACEMENT - Height check: current=${currentHeight}, imageBottom=${imageBottomPosition}, pixels=${pixelsSinceImageBottom}, required=${requiredPixelsAfterClearance}`);
                
                // If imageBottomPosition is 0, this is the first image - allow it
                // Otherwise, check if we have enough pixels since the image bottom
                if (imageBottomPosition > 0 && pixelsSinceImageBottom < requiredPixelsAfterClearance) {
                    console.log(`DEBUG: IMAGE PLACEMENT - In buffer period (${pixelsSinceImageBottom}/${requiredPixelsAfterClearance} pixels), skipping image`);
                    return false;
                }
                
                // No restriction and buffer period passed - place image
                console.log(`DEBUG: IMAGE PLACEMENT - No restriction, placing first ${alignment} image`);
                addImage(imageName, alignment, size);
                addOutput(`\nImage Size: ${size}\n`);
                imagePlacementRestricted = true;
                
                // Set the image bottom position and track the last floating image
                setTimeout(() => {

        function addImageToFlow(imageSrc, caption = '') {

            // Calculate current text height in container
            const containerHeight = contentStreamContainer.scrollHeight;

                } else if (templatesPerScreen === 3) {

                    placement = pattern[currentTemplate % 3];
                } else {

                    placement = pattern[currentTemplate % 4];
                }
                
                console.log(`Determined placement: ${placement}`);

        function calculateImagePriority(image, caption) {

        // Virtual template processing system
        function processVirtualTemplates() {
            console.log(`Processing virtual templates: ${textItems.length} text items, ${availableImages.length} images`);
            
            // Calculate current text flow height
            const currentTextHeight = measureCurrentTextHeight();
            
            // Update virtual template boundaries
            updateVirtualTemplateBoundaries(currentTextHeight);
            
            // Check if we need to place images in virtual templates
            checkAndPlaceTemplateImages();
            
            console.log(`Virtual templates: ${virtualTemplates.length} templates, ${placedImages.length} placed images`);

        function measureCurrentTextHeight() {
            if (textItems.length === 0) return 0;
            
            // Get the actual height of all text content
            const streamRect = contentStreamContainer.getBoundingClientRect();
            return streamRect.height;
        }
        
        function updateVirtualTemplateBoundaries(totalTextHeight) {
            const layoutParams = calculateLayoutParameters();
            const templateHeight = layoutParams.minImageSpacing; // Each template covers this much height
            const neededTemplates = Math.ceil(totalTextHeight / templateHeight) + 1; // +1 for future content
            
            // Ensure we have enough virtual templates
            while (virtualTemplates.length < neededTemplates) {
                const templateIndex = virtualTemplates.length;
                const startY = templateIndex * templateHeight;
                
                const template = {
                    id: templateIndex,
                    type: getTemplateType(templateIndex),
                    startY: startY,
                    endY: startY + templateHeight,
                    height: templateHeight,
                    hasImage: false,
                    layoutParams: layoutParams
                };
                
                virtualTemplates.push(template);
                console.log(`Created virtual template ${templateIndex}: ${template.type} at ${startY}-${template.endY}px`);
            }
        }
        
        function getTemplateType(index) {
            const types = ['image-left', 'image-right', 'image-center'];
            return types[index % types.length];

        function checkAndPlaceTemplateImages() {
            const layoutParams = calculateLayoutParameters();
            
            // Check each virtual template to see if it needs an image
            virtualTemplates.forEach(template => {
                if (!template.hasImage && shouldPlaceImageInTemplate(template)) {
                    const imageToPlace = selectImageForTemplate(template);
                    if (imageToPlace) {
                        placeImageInTemplate(template, imageToPlace, layoutParams);
                    }
                }
            });
        }
        
        function shouldPlaceImageInTemplate(template) {
            // Don't place too many images
            if (placedImages.length >= calculateLayoutParameters().maxImagesOnScreen) {
                return false;
            }
            
            // Place image if we have available images and sufficient text in this area
            return availableImages.length > 0 && hasTextInTemplateArea(template);
        }
        
        function hasTextInTemplateArea(template) {
            // Check if there's text content that falls within this template's Y boundaries
            // For now, use a simple heuristic based on template position
            const textItemsInArea = Math.floor(template.startY / 50); // Rough estimate of text items
            return textItemsInArea < textItems.length;
        }
        
        function selectImageForTemplate(template) {
            // Priority 1: Use image from newest text if available
            const newestTextWithImage = textItems
                .filter(item => item.isNew && item.associatedImage)
                .sort((a, b) => b.timestamp - a.timestamp)[0];
            
            if (newestTextWithImage && newestTextWithImage.associatedImage) {
                return newestTextWithImage.associatedImage;
            }
            
            // Priority 2: Use any available image near this template area
            const textNearTemplate = findTextNearTemplate(template);
            if (textNearTemplate && textNearTemplate.associatedImage) {
                return textNearTemplate.associatedImage;
            }
            
            // Priority 3: Use highest priority unused image
            const unusedImages = availableImages.filter(img => 
                !placedImages.some(placed => placed.imageData.src === img.src)
            );
            
            return unusedImages.sort((a, b) => b.priority - a.priority)[0] || null;
        }
        
        function findTextNearTemplate(template) {
            // Find text item that would be positioned near this template
            const estimatedTextIndex = Math.floor(template.startY / 30); // Rough text positioning
            return textItems[Math.min(estimatedTextIndex, textItems.length - 1)];
        }
        
        function placeImageInTemplate(template, imageData, layoutParams) {
            // Create image container
            const imageContainer = document.createElement('div');
            
            // Determine responsive image class based on viewport and template type
            const isMobile = window.innerWidth < layoutParams.mobileBreakpoint;
            
            if (isMobile) {
                // Mobile: all images are centered and block-level
                imageContainer.className = 'stream-image-mobile';
            } else {
                // Desktop/tablet: use floating images
                imageContainer.className = 'stream-image-float';
                
                // Add directional class based on template type
                if (template.type === 'image-left') {
                    imageContainer.classList.add('stream-image-left');
                } else if (template.type === 'image-right') {
                    imageContainer.classList.add('stream-image-right');
                } else {
                    // Center images on desktop are also mobile-style (block)
                    imageContainer.className = 'stream-image-mobile';
                }
            }
            
            // Create image element
            const img = document.createElement('img');
            img.src = imageData.src;
            img.className = 'stream-image';
            img.alt = imageData.caption || '';
            
            // Add image to container
            imageContainer.appendChild(img);
            
            // Add caption if provided
            if (imageData.caption && imageData.caption.trim()) {
                const captionDiv = document.createElement('div');
                captionDiv.className = 'stream-caption';
                captionDiv.textContent = imageData.caption;
                imageContainer.appendChild(captionDiv);
            }
            
            // Find insertion point based on template boundaries
            const insertionPoint = findInsertionPointForTemplate(template);
            
            if (insertionPoint) {
                // Insert image at calculated position
                if (insertionPoint.nextSibling) {
                    contentStreamContainer.insertBefore(imageContainer, insertionPoint.nextSibling);
                } else {
                    contentStreamContainer.appendChild(imageContainer);
                }
            } else {
                // Fallback: append to container
                contentStreamContainer.appendChild(imageContainer);
            }
            
            // Track placed image
            const placedImage = {
                imageData: imageData,
                template: template,
                element: imageContainer,
                timestamp: Date.now()
            };
            
            placedImages.push(placedImage);
            template.hasImage = true;
            template.placedImage = placedImage;
            
            // Remove image from available images
            const imageIndex = availableImages.findIndex(img => img.src === imageData.src);
            if (imageIndex >= 0) {
                availableImages.splice(imageIndex, 1);
            }
            
            console.log(`Placed image ${imageData.src} in ${template.type} template at Y:${template.startY}-${template.endY}`);
        }
        
        function findInsertionPointForTemplate(template) {
            // Find the text marker that corresponds to this template's position
            const textMarkers = contentStreamContainer.querySelectorAll('.text-marker');
            
            // For now, use a simple approach: insert after a calculated number of text elements
            const estimatedTextIndex = Math.floor(template.startY / 30); // Rough estimation
            const targetIndex = Math.min(estimatedTextIndex, textMarkers.length - 1);
            
            if (textMarkers.length > 0 && targetIndex >= 0) {
                return textMarkers[targetIndex];
            }
            
            // Fallback: insert at the beginning of content
            return contentStreamContainer.firstChild;

        // Template layout system
        function rebuildTemplateLayout() {
            console.log(`Rebuilding layout: ${textBuffer.length} text items, ${imageBuffer.length} images`);
            
            // Clear current layout
            contentStreamContainer.innerHTML = '';
            
            // Create template stack based on available images and viewport

            console.log(`Layout complete: ${templateStack.length} templates created`);

        function createTemplateStack() {
            const layoutParams = calculateLayoutParameters();
            const templates = [];
            
            // Sort images by priority
            const sortedImages = [...imageBuffer].sort((a, b) => b.priority - a.priority);
            
            // Determine how many images to show
            const maxImages = Math.min(sortedImages.length, layoutParams.maxImagesOnScreen);
            
            console.log(`Creating templates for ${maxImages} images`);
            
            for (let i = 0; i < maxImages; i++) {
                const image = sortedImages[i];
                const template = createImageTemplate(image, i, layoutParams);
                templates.push(template);
            }
            
            return templates;
        }
        
        function createImageTemplate(imageData, index, layoutParams) {

            const templateType = templateTypes[index % templateTypes.length];

            const templateDiv = document.createElement('div');

            img.className = 'template-img';

                imageContainer.appendChild(captionDiv);

            if (templateType === 'image-center') {

                templateDiv.appendChild(imageContainer);
                templateDiv.appendChild(textArea);

                templateDiv.appendChild(textArea);
                templateDiv.appendChild(imageContainer);
            }
            
            return {
                element: templateDiv,

        function flowTextThroughTemplates() {
            // Add templates to DOM first
            templateStack.forEach(template => {
                contentStreamContainer.appendChild(template.element);
            });
            
            // Flow all text through template text areas
            let textIndex = 0;
            let templateIndex = 0;
            const layoutParams = calculateLayoutParameters();
            
            while (textIndex < textBuffer.length) {
                const textItem = textBuffer[textIndex];
                
                // Determine target text area
                let targetTextArea;
                if (templateIndex < templateStack.length) {
                    targetTextArea = templateStack[templateIndex].textArea;
                } else {
                    // Create a text-only template for remaining text
                    const textOnlyTemplate = createTextOnlyTemplate();
                    templateStack.push(textOnlyTemplate);
                    contentStreamContainer.appendChild(textOnlyTemplate.element);
                    targetTextArea = textOnlyTemplate.textArea;
                }
                
                // Add text to the area
                const textSpan = document.createElement('span');
                textSpan.className = 'flowing-text';
                if (textItem.isNew) {
                    textSpan.className += ' new-output';
                }
                textSpan.textContent = textItem.content;
                targetTextArea.appendChild(textSpan);
                
                textIndex++;
                
                // Move to next template based on spacing rules
                if (shouldMoveToNextTemplate(targetTextArea, layoutParams)) {
                    templateIndex++;
                }
            }
            
            console.log(`Text flowed through ${templateIndex + 1} templates`);
        }
        
        function createTextOnlyTemplate() {
            const templateDiv = document.createElement('div');
            templateDiv.className = 'layout-template template-text-only';
            
            const textArea = document.createElement('div');
            textArea.className = 'template-text-area';
            templateDiv.appendChild(textArea);
            
            return {
                element: templateDiv,
                textArea: textArea,
                imageData: null,
                type: 'text-only'

        function shouldMoveToNextTemplate(textArea, layoutParams) {
            // Move to next template when we have sufficient text height
            const textHeight = textArea.getBoundingClientRect().height;
            return textHeight > layoutParams.minImageSpacing;
        }
        
        // New layout evaluation engine - processes all text-image chunks
        function evaluateLayoutForAllChunks() {
            console.log(`Evaluating layout for ${textImageChunks.length} chunks`);
            
            const layoutParams = calculateLayoutParameters();
            let pixelsSinceLastImage = 0;
            let imageCount = 0;
            
            textImageChunks.forEach((chunk, index) => {
                // Measure distance from last image
                if (chunk.textElement) {
                    const textHeight = chunk.textElement.getBoundingClientRect().height || 20;
                    pixelsSinceLastImage += textHeight;
                }
                
                // Decide whether to show this chunk's image
                if (chunk.imageData && !chunk.displayState.imageVisible) {
                    const shouldShow = shouldShowImageForChunk(chunk, pixelsSinceLastImage, imageCount, layoutParams);
                    
                    if (shouldShow) {
                        showImageForChunk(chunk, layoutParams);
                        pixelsSinceLastImage = 0; // Reset distance counter
                        imageCount++;
                        console.log(`Showing image for chunk ${chunk.id} (${imageCount} total images)`);
                    }
                } else if (chunk.imageData && chunk.displayState.imageVisible) {
                    // Re-evaluate existing visible images (for rescaling)
                    updateImageForChunk(chunk, layoutParams);
                }
            });
            
            console.log(`Layout evaluation complete: ${imageCount} images visible`);
        }
        
        function calculateLayoutParameters() {
            const viewportWidth = window.innerWidth;
            const viewportHeight = window.innerHeight;
            
            // Simple, robust parameters
            let minImageSpacing = 300; // minimum pixels between images
            let maxImagesOnScreen = 8;  // reasonable max
            let imageScale = 1.0;
            
            // Adjust based on screen size
            if (viewportWidth < 480) {
                minImageSpacing = 200;
                maxImagesOnScreen = 4;
                imageScale = 0.8;
            } else if (viewportWidth < 768) {
                minImageSpacing = 250;
                maxImagesOnScreen = 6;
                imageScale = 0.9;
            } else if (viewportWidth > 1400) {
                minImageSpacing = 400;
                maxImagesOnScreen = 10;
                imageScale = 1.1;
            }
            
            return {
                minImageSpacing,
                maxImagesOnScreen,
                imageScale,
                isMobile: viewportWidth < 768
            };
        }
        
        function shouldShowImageForChunk(chunk, pixelsSinceLastImage, currentImageCount, layoutParams) {
            // Rule 1: Respect maximum image count
            if (currentImageCount >= layoutParams.maxImagesOnScreen) {
                return false;
            }
            
            // Rule 2: Respect minimum spacing
            if (pixelsSinceLastImage < layoutParams.minImageSpacing) {
                return false;
            }
            
            // Rule 3: Always show if we have very few images
            if (currentImageCount < 2) {
                return true;
            }
            
            // Rule 4: Show based on image priority
            return chunk.imageData.priority > 0.6;
        }
        
        // Proximity-based placement: place image near its source text in the stream
        function evaluateProximityPlacement(chunk) {
            if (!chunk.imageData) return;
            
            const layoutParams = calculateLayoutParameters();
            const shouldShow = shouldShowImageBasedOnGlobalState(chunk, layoutParams);
            
            if (shouldShow) {
                placeImageNearText(chunk, layoutParams);
                console.log(`Showing image for chunk ${chunk.id} with proximity placement`);
            } else {
                console.log(`Hiding image for chunk ${chunk.id} (layout rules)`);
            }
        }
        
        function shouldShowImageBasedOnGlobalState(chunk, layoutParams) {
            // Count currently visible images
            const visibleImageCount = textImageChunks.filter(c => c.displayState.imageVisible).length;
            
            // Rule 1: Respect maximum image count
            if (visibleImageCount >= layoutParams.maxImagesOnScreen) {
                return false;
            }
            
            // Rule 2: Check spacing from last visible image
            const pixelsSinceLastImage = calculatePixelsSinceLastVisibleImage(chunk);
            if (pixelsSinceLastImage < layoutParams.minImageSpacing) {
                return false;
            }
            
            // Rule 3: Always show if we have very few images
            if (visibleImageCount < 2) {
                return true;
            }
            
            // Rule 4: Show based on image priority
            return chunk.imageData.priority > 0.6;
        }
        
        function calculatePixelsSinceLastVisibleImage(currentChunk) {
            let pixelAccumulator = 0;
            
            // Walk backwards from current chunk to find last visible image
            for (let i = currentChunk.id - 1; i >= 0; i--) {
                const chunk = textImageChunks[i];
                if (chunk.displayState.imageVisible) {
                    // Found last visible image, return accumulated distance
                    return pixelAccumulator;
                }
                
                // Add this chunk's text height to accumulator
                if (chunk.textElement) {
                    const height = chunk.textElement.getBoundingClientRect().height || 20;
                    pixelAccumulator += height;
                }
            }
            
            // No previous visible image found, return total distance
            return pixelAccumulator;
        }
        
        function placeImageNearText(chunk, layoutParams) {
            // Determine placement strategy
            const visibleImageCount = textImageChunks.filter(c => c.displayState.imageVisible).length;
            const placement = determineImagePlacement(visibleImageCount, layoutParams);
            
            // Create image container
            const imageContainer = document.createElement('div');
            
            if (layoutParams.isMobile || placement === 'center') {
                imageContainer.className = 'stream-image-mobile new-output';
            } else {
                imageContainer.className = `stream-image-float stream-image-${placement} new-output`;
                imageContainer.style.maxWidth = `${layoutParams.imageScale * 300}px`;
            }
            
            // Create image element
            const img = document.createElement('img');
            img.src = chunk.imageData.src;
            img.className = 'stream-image';
            img.alt = chunk.imageData.caption || chunk.imageData.src;
            imageContainer.appendChild(img);
            
            // Add caption if present
            if (chunk.imageData.caption && chunk.imageData.caption.trim()) {
                const captionDiv = document.createElement('div');
                captionDiv.className = 'stream-caption';
                captionDiv.textContent = chunk.imageData.caption;
                imageContainer.appendChild(captionDiv);
            }
            
            // PROXIMITY PLACEMENT: Insert near the source text element
            const insertionPoint = findOptimalInsertionPoint(chunk);
            if (insertionPoint) {
                contentStreamContainer.insertBefore(imageContainer, insertionPoint);
            } else {
                contentStreamContainer.appendChild(imageContainer);
            }
            
            // Update chunk state
            chunk.displayState.imageVisible = true;
            chunk.displayState.imageElement = imageContainer;
            chunk.displayState.imageScale = layoutParams.imageScale;
            chunk.displayState.placement = placement;
        }
        
        function determineImagePlacement(imageCount, layoutParams) {
            if (layoutParams.isMobile) return 'mobile';
            
            // Cycle through placements for variety
            const placements = ['left', 'right', 'center'];
            return placements[imageCount % placements.length];
        }
        
        function findOptimalInsertionPoint(chunk) {
            // Find the best place to insert the image near the source text
            
            if (chunk.textElement && chunk.textElement.nextSibling) {
                // Insert right after the source text element
                return chunk.textElement.nextSibling;
            } else if (chunk.textElement) {
                // Insert right after the source text element (at end)
                return null; // appendChild will be used
            } else {
                // No source text element, insert at end
                return null;
            }
        }
        
        function updateImageForChunk(chunk, layoutParams) {
            // Rescale existing image if needed
            if (chunk.displayState.imageElement && chunk.displayState.imageScale !== layoutParams.imageScale) {
                if (!layoutParams.isMobile) {
                    chunk.displayState.imageElement.style.maxWidth = `${layoutParams.imageScale * 300}px`;
                }
                chunk.displayState.imageScale = layoutParams.imageScale;
            }
        }
        
        function analyzeLayoutMetrics() {
            const viewportWidth = window.innerWidth;
            const viewportHeight = window.innerHeight;
            const aspectRatio = viewportWidth / viewportHeight;
            
            // REAL PIXEL MEASUREMENTS instead of character estimates
            const actualTextHeight = measureActualTextHeight();
            const availableTextWidth = calculateAvailableTextWidth();
            const textDensity = actualTextHeight / viewportHeight; // how much of screen is text
            
            const isMobile = viewportWidth < 768;
            const isTablet = viewportWidth >= 768 && viewportWidth < 1024;
            const isDesktop = viewportWidth >= 1024;
            const isUltraWide = aspectRatio > 2.0;
            const isTallMobile = aspectRatio < 0.6;
            
            // Calculate optimal image spacing based on SCREEN REAL ESTATE
            const optimalImageSpacing = calculateOptimalImageSpacing(viewportWidth, viewportHeight, actualTextHeight);
            const maxImagesForViewport = calculateMaxImagesForViewport(viewportWidth, viewportHeight, textDensity);
            
            return {
                viewportWidth,
                viewportHeight,
                aspectRatio,
                actualTextHeight,
                availableTextWidth,
                textDensity,
                optimalImageSpacing, // pixels between images
                maxImagesForViewport, // absolute max based on screen space
                isMobile,
                isTablet,
                isDesktop,
                isUltraWide,
                isTallMobile
            };
        }
        
        function measureActualTextHeight() {
            if (!contentStreamContainer) {
                console.log('No content stream container');
                return 0;
            }
            
            // Measure the actual rendered height of text content
            let totalTextHeight = 0;
            const textElements = contentStreamContainer.querySelectorAll('.text-marker');
            
            console.log(`Found ${textElements.length} text elements`);
            
            textElements.forEach(element => {
                const rect = element.getBoundingClientRect();
                totalTextHeight += rect.height;
                console.log(`Text element height: ${rect.height}px`);
            });
            
            console.log(`Total measured text height: ${totalTextHeight}px`);
            return totalTextHeight;
        }
        
        function calculateAvailableTextWidth() {
            if (!contentStreamContainer) return window.innerWidth - 80;
            
            const containerRect = contentStreamContainer.getBoundingClientRect();
            return containerRect.width;
        }
        
        function calculateOptimalImageSpacing(viewportWidth, viewportHeight, textHeight) {
            // Base spacing: aim for images every N pixels of text height
            let baseSpacing = 400; // pixels of text height between images
            
            if (viewportWidth < 480) {
                baseSpacing = 300; // more frequent on small mobile
            } else if (viewportWidth < 768) {
                baseSpacing = 350; // moderate on mobile
            } else if (viewportWidth > 1400) {
                baseSpacing = 500; // less frequent on large screens
            }
            
            return baseSpacing;
        }
        
        function calculateMaxImagesForViewport(viewportWidth, viewportHeight, textDensity) {
            // Calculate absolute maximum images based on screen real estate
            const screenArea = viewportWidth * viewportHeight;
            const baseImagesPerScreenArea = 2; // base: 2 images per full screen
            
            let maxImages = Math.floor(screenArea / 300000) * baseImagesPerScreenArea; // ~2 per 300k pixels
            
            // Adjust for text density
            if (textDensity > 0.8) {
                maxImages = Math.floor(maxImages * 1.2); // more images if lots of text
            } else if (textDensity < 0.3) {
                maxImages = Math.floor(maxImages * 0.7); // fewer if little text
            }
            
            // Minimum thresholds to prevent single-image scenarios
            if (viewportWidth < 480) {
                maxImages = Math.max(3, maxImages); // at least 3 on small mobile
            } else if (viewportWidth < 768) {
                maxImages = Math.max(4, maxImages); // at least 4 on mobile
            } else {
                maxImages = Math.max(5, maxImages); // at least 5 on desktop
            }
            
            return maxImages;
        }
        
        function calculateOptimalTextToImageRatio(viewportWidth, aspectRatio) {
            // Base ratio: more text, fewer images
            let baseRatio = 3.0; // 3:1 text to image ratio (more generous)
            
            // Adjust based on viewport characteristics
            if (viewportWidth < 480) {
                // Small mobile: frequent small images for visual breaks
                baseRatio = 2.5;
            } else if (viewportWidth < 768) {
                // Mobile: moderate image frequency
                baseRatio = 3.0;
            } else if (aspectRatio > 2.0) {
                // Ultra-wide: still more text-heavy but not extreme
                baseRatio = 5.0; // reduced from 8.0
            } else if (aspectRatio > 1.5) {
                // Wide screens: balanced
                baseRatio = 3.5;
            }
            
            return baseRatio;
        }
        
        function selectImagesForPlacement(layoutMetrics) {
            // Sort pending images by priority (descending)
            const sortedImages = [...pendingImages].sort((a, b) => b.priority - a.priority);
            
            // PIXEL-BASED APPROACH: Use actual screen measurements
            const totalImages = pendingImages.length;
            
            // PRIORITY 1: Cached preference (for viewport restoration)
            let targetImageCount;
            if (layoutMetrics.preferredImageCount) {
                targetImageCount = Math.min(totalImages, layoutMetrics.preferredImageCount);
                console.log(`Using cached preference: ${targetImageCount} images`);
            } else {
                // PRIORITY 2: Viewport maximum (prevents single-image scenarios)
                targetImageCount = Math.min(totalImages, layoutMetrics.maxImagesForViewport);
                
                // PRIORITY 3: Spacing-based calculation
                if (layoutMetrics.actualTextHeight > 0) {
                    const spacingBasedCount = Math.floor(layoutMetrics.actualTextHeight / layoutMetrics.optimalImageSpacing);
                    targetImageCount = Math.min(targetImageCount, Math.max(1, spacingBasedCount));
                    console.log(`Spacing-based count: ${spacingBasedCount} (${layoutMetrics.actualTextHeight}px / ${layoutMetrics.optimalImageSpacing}px)`);
                } else {
                    console.log('No text height measured, using viewport maximum');
                    // If no text height available, use a reasonable default
                    targetImageCount = Math.min(totalImages, Math.floor(layoutMetrics.maxImagesForViewport * 0.7));
                }
                
                // PRIORITY 4: Maintain minimum image thresholds
                const absoluteMinimum = calculateAbsoluteMinimumImages(layoutMetrics);
                targetImageCount = Math.max(targetImageCount, absoluteMinimum);
            }
            
            const absoluteMinimum = calculateAbsoluteMinimumImages(layoutMetrics);
            console.log(`Image selection: ${totalImages} available, ${targetImageCount} selected (max: ${layoutMetrics.maxImagesForViewport}, min: ${absoluteMinimum})`);
            
            // Select images and assign scale factors based on density
            const selectedImages = sortedImages.slice(0, targetImageCount).map((image, index) => {
                return {
                    ...image,
                    scaleHint: calculateImageScaleHint(layoutMetrics, index, targetImageCount, totalImages)
                };
            });
            
            return selectedImages;
        }
        
        function calculateAbsoluteMinimumImages(layoutMetrics) {
            // Prevent single-image scenarios with hard minimums
            if (layoutMetrics.viewportWidth < 480) {
                return Math.min(pendingImages.length, 3); // at least 3 on small mobile
            } else if (layoutMetrics.viewportWidth < 768) {
                return Math.min(pendingImages.length, 4); // at least 4 on mobile
            } else if (layoutMetrics.viewportWidth < 1024) {
                return Math.min(pendingImages.length, 5); // at least 5 on tablet
            } else {
                return Math.min(pendingImages.length, 6); // at least 6 on desktop
            }
        }
        
        function calculateImageScaleHint(layoutMetrics, imageIndex, selectedCount, totalCount) {
            let scaleHint = 1.0;
            
            // If we're showing more images than "optimal", scale them down
            const optimalCount = Math.floor(totalCount / layoutMetrics.textToImageRatio);
            if (selectedCount > optimalCount) {
                const overcrowdingRatio = selectedCount / optimalCount;
                scaleHint = Math.max(0.6, 1.0 / Math.sqrt(overcrowdingRatio));
            }
            
            // Mobile gets smaller images for better text flow
            if (layoutMetrics.isMobile) {
                scaleHint *= 0.8;
            }
            
            // Ultra-wide gets smaller images to maintain text dominance
            if (layoutMetrics.isUltraWide) {
                scaleHint *= 0.7;
            } else if (layoutMetrics.aspectRatio > 1.5) {
                scaleHint *= 0.85;
            }
            
            return Math.max(0.4, Math.min(1.2, scaleHint)); // Clamp between 40% and 120%
        }
        
        function rebuildCuratedContent(selectedImages, layoutMetrics) {
            // Calculate text chunks based on actual pixel measurements
            const textChunks = calculateTextChunks(layoutMetrics);
            const insertionPoints = calculateOptimalInsertionPoints(textChunks, selectedImages.length);
            
            // Clear pending images since we're processing them
            pendingImages = [];
            
            // Place images at calculated insertion points
            selectedImages.forEach((imageData, index) => {
                if (index < insertionPoints.length) {
                    const insertionPoint = insertionPoints[index];
                    placeImageAtTextPosition(imageData, insertionPoint, layoutMetrics);
                }
            });
            
            // Cache this successful layout for viewport restoration
            const currentWidth = Math.floor(window.innerWidth / 100) * 100; // round to nearest 100px
            viewportDensityCache.set(currentWidth, selectedImages.length);
            
            console.log(`Placed ${selectedImages.length} images at ${insertionPoints.length} insertion points. Cached for width ${currentWidth}`);
        }
        
        function calculateTextChunks(layoutMetrics) {
            // PIXEL-BASED text chunking instead of character counting
            const targetSpacing = layoutMetrics.optimalImageSpacing;
            
            const chunks = [];
            let currentChunk = [];
            let currentPixelHeight = 0;
            
            textContent.forEach(textItem => {
                // Measure actual rendered height of this text element
                let elementHeight = 20; // default fallback
                if (textItem.element) {
                    const rect = textItem.element.getBoundingClientRect();
                    elementHeight = rect.height > 0 ? rect.height : 20;
                } else {
                    // Estimate based on character count if element not available
                    elementHeight = Math.max(20, textItem.characterCount / 50 * 20);
                }
                
                currentChunk.push(textItem);
                currentPixelHeight += elementHeight;
                
                // If we've accumulated enough pixel height, create a chunk
                if (currentPixelHeight >= targetSpacing) {
                    chunks.push({
                        textItems: [...currentChunk],
                        pixelHeight: currentPixelHeight,
                        characterCount: currentChunk.reduce((sum, item) => sum + item.characterCount, 0)
                    });
                    currentChunk = [];
                    currentPixelHeight = 0;
                }
            });
            
            // Add remaining text as final chunk
            if (currentChunk.length > 0) {
                chunks.push({
                    textItems: [...currentChunk],
                    pixelHeight: currentPixelHeight,
                    characterCount: currentChunk.reduce((sum, item) => sum + item.characterCount, 0)
                });
            }
            
            console.log(`Text chunks: ${chunks.length} chunks with target spacing ${targetSpacing}px`);
            return chunks;
        }
        
        function calculateOptimalInsertionPoints(textChunks, imageCount) {
            if (textChunks.length === 0 || imageCount === 0) return [];
            
            const points = [];
            const chunkInterval = Math.max(1, Math.floor(textChunks.length / (imageCount + 1)));
            
            for (let i = 0; i < imageCount && i * chunkInterval + 1 < textChunks.length; i++) {
                points.push((i + 1) * chunkInterval);
            }
            
            return points;
        }
        
        function placeImageAtTextPosition(imageData, position, layoutMetrics) {
            // Use the scale hint from image selection, fallback to old method
            const scaleHint = imageData.scaleHint || calculateImageScale(layoutMetrics);
            const placement = placedImages.length % 2 === 0 ? 'left' : 'right';
            
            // Create image container with appropriate scaling
            const imageContainer = document.createElement('div');
            
            if (layoutMetrics.isMobile) {
                imageContainer.className = 'stream-image-mobile new-output';
                // Apply mobile scaling
                imageContainer.style.maxWidth = `${scaleHint * 100}%`;
            } else {
                imageContainer.className = `stream-image-float stream-image-${placement} new-output`;
                // Apply desktop scaling
                imageContainer.style.maxWidth = `${scaleHint * 300}px`;
            }
            
            const img = document.createElement('img');
            img.src = imageData.src;
            img.className = 'stream-image';
            img.alt = imageData.caption || imageData.src;
            imageContainer.appendChild(img);
            
            if (imageData.caption && imageData.caption.trim()) {
                const captionDiv = document.createElement('div');
                captionDiv.className = 'stream-caption';
                captionDiv.textContent = imageData.caption;
                // Scale caption font size with image
                if (scaleHint < 0.8) {
                    captionDiv.style.fontSize = `${scaleHint * 0.85}em`;
                }
                imageContainer.appendChild(captionDiv);
            }
            
            // Insert at calculated position in text flow
            contentStreamContainer.appendChild(imageContainer);
            
            placedImages.push({
                element: imageContainer,
                data: imageData,
                placement: layoutMetrics.isMobile ? 'mobile' : placement,
                scale: scaleHint
            });
        }
        
        function calculateImageScale(layoutMetrics) {
            let scale = 1.0;
            
            // Scale down for ultra-wide screens to maintain text dominance
            if (layoutMetrics.isUltraWide) {
                scale = 0.7;
            } else if (layoutMetrics.aspectRatio > 1.5) {
                scale = 0.85;
            }
            
            // Scale up slightly for mobile to maintain visibility
            if (layoutMetrics.isMobile && !layoutMetrics.isTallMobile) {
                scale = Math.min(1.2, scale * 1.15);
            }
            
            return scale;
        }
        
        // Simple viewport resize handler - re-evaluates all chunks
        let resizeTimeout;
        window.addEventListener('resize', function() {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(handleViewportResize, 250);
        });
        
        function handleViewportResize() {
            console.log(`Viewport resize to ${window.innerWidth}x${window.innerHeight}`);
            
            if (!contentStreamContainer) return;
            
            // Reset virtual template system for new viewport
            const currentImages = contentStreamContainer.querySelectorAll('img');
            const isMobile = window.innerWidth < 768;
            
            // Update existing images for new viewport
            currentImages.forEach((img, index) => {
                const templateIndex = index % 3;
                let templateType;
                
                if (isMobile) {
                    templateType = 'center';
                } else {
                    switch (templateIndex) {
                        case 0: templateType = 'left'; break;
                        case 1: templateType = 'right'; break;
                        case 2: templateType = 'center'; break;
                        default: templateType = 'left';
                    }
                }
                
                if (templateType === 'center') {
                    img.style.float = 'none';
                    img.style.display = 'block';
                    img.style.margin = '20px auto';
                    img.style.clear = 'both';
                    img.style.maxWidth = isMobile ? '100%' : '400px';
                } else {
                    img.style.float = templateType;
                    img.style.display = 'block';
                    img.style.margin = templateType === 'left' ? '10px 20px 10px 0' : '10px 0 10px 20px';
                    img.style.clear = 'none';
                    img.style.maxWidth = '250px';
                }
            });
            
            // Recalculate virtual template positions
            virtualTemplates = [];
            lastImageBottom = 0;
            currentTextHeight = contentStreamContainer.scrollHeight;
            
            console.log(`Resize complete: Updated ${currentImages.length} images, reset virtual templates`);
        }
        
        // Expose functions to Swift
        window.addContent = addContent;
        window.checkAndPlaceImage = checkAndPlaceImage;
        window.checkImageClearance = checkImageClearance;
    </script>
</body>
