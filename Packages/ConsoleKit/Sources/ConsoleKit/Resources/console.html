<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="default.css">
</head>
<body>
    <div id="status-container">
        <div id="status-bar" style="display: none;"></div>
    </div>
    <div id="scroll-container">
        <div id="content">
            <div id="output"></div>
    <div id="menu-container" style="display: none;">
        <div id="menu-title"></div>
        <div id="menu-items"></div>
    </div>
    <div id="input-line" style="display: none;">
        <span id="prompt">></span>
        <textarea id="input" rows="1"></textarea>
    </div>
    <div id="error-message" style="display: none;"></div>
        </div>
    </div>

    <script>
        // Override console.log to send messages to Swift
        const originalConsoleLog = console.log;
        console.log = function(...args) {
            const message = args.map(arg =>
                typeof arg === 'object' ? JSON.stringify(arg) : String(arg)
            ).join(' ');

            if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.consoleLog) {
                window.webkit.messageHandlers.consoleLog.postMessage(message);
            }

            originalConsoleLog.apply(console, args);
        };

        const output = document.getElementById('output');
        const input = document.getElementById('input');
        const menuContainer = document.getElementById('menu-container');
        const menuTitle = document.getElementById('menu-title');
        const menuItems = document.getElementById('menu-items');
        const errorMessage = document.getElementById('error-message');
        const statusBar = document.getElementById('status-bar');

        let menuMode = false;
        let currentMenuData = null;
        let selectedIndex = 0;
        let shouldMarkOldOnNextOutput = false;

        // ═══════════════════════════════════════════════════
        // Content Stream — the source of truth for layout
        // ═══════════════════════════════════════════════════

        // Each item: { type: 'text', text: '...' }
        //        or: { type: 'image', src: '...', caption: '...', priority: 0.0-1.0, width: N, height: N }
        //        or: { type: 'system', text: '...' }
        let contentStream = [];
        let contentStreamContainer = null;

        // Committed placement decisions survive append-triggered re-renders.
        // Only a resize (or clear) resets these, forcing a full re-score.
        // Key: streamIndex, Value: { alignment, widthPercent, score }
        let committedPlacements = {};
        // Set of streamIndex values that were evaluated and skipped (not placed).
        let committedSkips = new Set();

        // ─── Layout knobs (tunable from Swift) ───

        const layoutKnobs = {
            density: 0.5,       // 0 = sparse, 1 = dense
            prominence: 0.5,    // 0 = small images, 1 = large
            variety: 0.5,       // 0 = repetitive alignment, 1 = varied
            priorityBias: 0.5,  // 0 = aesthetics first, 1 = priority first
            textBefore: 0.5,    // 0 = no minimum text, 1 = lots of text before images
        };

        // ─── Push content into the stream ───

        function pushText(text) {
            if (!text || !text.trim()) return;
            contentStream.push({ type: 'text', text: text });
            renderLayout();
        }

        function pushImage(src, caption, priority, width, height) {
            contentStream.push({
                type: 'image', src: src, caption: caption || '',
                priority: priority || 0.5, width: width || 0, height: height || 0
            });
            renderLayout();
        }

        function pushSystem(text) {
            if (!text) return;
            contentStream.push({ type: 'system', text: text });
            renderLayout();
        }

        function clearContentStream() {
            contentStream = [];
            committedPlacements = {};
            committedSkips = new Set();
            renderLayout();
        }

        // Backward-compatible wrappers
        function addContent(text, image, caption) {
            if (text && text.trim()) pushText(text);
        }

        function addText(text) {
            pushText(text);
        }

        // ─── Line-based output (legacy, appends outside content stream) ───

        function addOutput(text, className) {
            // System output goes into the content stream so it
            // interleaves correctly and survives re-layout
            pushSystem(text);
        }

        function clearOutput() {
            contentStream = [];
            committedPlacements = {};
            committedSkips = new Set();
            output.innerHTML = '';
            contentStreamContainer = null;
        }

        // ═══════════════════════════════════════════════════
        // Layout Engine — scores and renders the full stream
        // ═══════════════════════════════════════════════════

        let resizeDebounceTimer = null;

        function renderLayout(fullRescore = false) {
            if (fullRescore) {
                committedPlacements = {};
                committedSkips = new Set();
            }

            if (shouldMarkOldOnNextOutput) {
                shouldMarkOldOnNextOutput = false;
            }

            const scrollContainer = document.getElementById('scroll-container');
            const wasAtBottom = scrollContainer
                ? (scrollContainer.scrollTop + scrollContainer.clientHeight >= scrollContainer.scrollHeight - 30)
                : true;

            // Preserve scroll anchor: find element nearest viewport top
            let anchorIndex = -1;
            let anchorOffset = 0;
            if (contentStreamContainer) {
                const children = contentStreamContainer.children;
                const scrollTop = scrollContainer ? scrollContainer.scrollTop : 0;
                for (let i = 0; i < children.length; i++) {
                    const child = children[i];
                    const top = child.offsetTop;
                    if (top >= scrollTop) {
                        anchorIndex = parseInt(child.dataset.streamIndex || '-1');
                        anchorOffset = top - scrollTop;
                        break;
                    }
                }
            }

            // Score the full stream and build render list
            const renderList = scoreFullStream();

            // Build the DOM
            const newContainer = document.createElement('div');
            newContainer.className = 'content-stream';
            newContainer.id = 'content-stream';
            newContainer.style.color = 'inherit';
            newContainer.style.fontFamily = 'inherit';
            newContainer.style.fontSize = 'inherit';
            newContainer.style.lineHeight = '1.6';
            newContainer.style.wordWrap = 'break-word';
            newContainer.style.overflow = 'hidden';

            for (const item of renderList) {
                const el = createElementForItem(item);
                if (el) newContainer.appendChild(el);
            }

            // Swap the container
            if (contentStreamContainer) {
                contentStreamContainer.replaceWith(newContainer);
            } else {
                output.appendChild(newContainer);
            }
            contentStreamContainer = newContainer;

            // Restore scroll position after DOM settles
            if (wasAtBottom && scrollContainer) {
                // Immediate jump to bottom, then smooth-scroll once images load
                scrollContainer.scrollTop = scrollContainer.scrollHeight;
                setTimeout(() => {
                    scrollContainer.scrollTo({ top: scrollContainer.scrollHeight, behavior: 'smooth' });
                }, 50);
            } else if (anchorIndex >= 0 && scrollContainer) {
                const anchored = newContainer.querySelector(`[data-stream-index="${anchorIndex}"]`);
                if (anchored) {
                    scrollContainer.scrollTop = anchored.offsetTop - anchorOffset;
                }
            }
        }

        // ─── Scoring: two-pass layout over the full stream ───
        //
        // Pass 1: Walk the stream to build a text height map and collect
        //         all image candidates with their positions.
        // Pass 2: Identify placement slots (where spacing allows an image),
        //         assign the best available image (by priority) to each slot,
        //         then render the final list.

        function scoreFullStream() {
            const viewportWidth = window.innerWidth;
            const viewportHeight = window.innerHeight;

            const viewportFactor = Math.max(1.0, viewportWidth / 700);
            const baseMinSpacing = 150 + (1.0 - layoutKnobs.density) * 400;
            const minSpacing = baseMinSpacing * viewportFactor;

            // ── Pass 1: build text map + collect image candidates ──

            const textHeightAt = [];
            let cumulativeHeight = 0;
            const imageCandidates = [];

            // Minimum lines of full-width text before an image, scaled by viewport.
            // Small window (<600px): 2-4 lines, Medium (600-1200): 3-8 lines, Large (>1200): 5-12 lines
            const statusBarH = statusBar.style.display === 'none' ? 0 : statusBar.offsetHeight;
            const availableHeight = viewportHeight - statusBarH;
            let baseMinLines;
            if (availableHeight < 500) {
                baseMinLines = 2;   // small: 2-4
            } else if (availableHeight < 900) {
                baseMinLines = 3;   // medium: 3-8
            } else {
                baseMinLines = 5;   // large: 5-12
            }
            // textBefore knob scales from baseMinLines to baseMinLines * 2.5
            const minLinesBeforeImage = Math.round(baseMinLines + layoutKnobs.textBefore * baseMinLines * 1.5);
            const lineHeight = 24;
            const minTextHeightBeforeImage = minLinesBeforeImage * lineHeight;

            for (let i = 0; i < contentStream.length; i++) {
                textHeightAt[i] = cumulativeHeight;
                const item = contentStream[i];
                if (item.type === 'text' || item.type === 'system') {
                    cumulativeHeight += estimateTextHeight(item.text, viewportWidth);
                } else if (item.type === 'image') {
                    imageCandidates.push({
                        streamIndex: i,
                        priority: item.priority || 0.5,
                        src: item.src,
                        caption: item.caption || '',
                    });
                }
            }

            // ── Pass 2: assign images to placement slots ──

            // placedAt[streamIndex] = placement decision for that image
            const placedAt = {};
            // Track which text-height regions are "taken" by placed images
            const placedHeights = []; // heights where images were placed
            let recentAlignments = [];

            // First, lock in committed placements (from previous renders)
            for (const candidate of imageCandidates) {
                const idx = candidate.streamIndex;
                if (committedPlacements[idx]) {
                    placedAt[idx] = committedPlacements[idx];
                    placedHeights.push(textHeightAt[idx]);
                    recentAlignments.unshift(committedPlacements[idx].alignment);
                    if (recentAlignments.length > 5) recentAlignments.pop();
                }
            }

            // Then score uncommitted images (new ones, or all if full rescore)
            // Sort by priority (highest first) so best images get first pick
            const uncommitted = imageCandidates
                .filter(c => !committedPlacements[c.streamIndex] && !committedSkips.has(c.streamIndex));
            const ranked = uncommitted.slice().sort((a, b) => b.priority - a.priority);

            for (const candidate of ranked) {
                const heightAtImage = textHeightAt[candidate.streamIndex];

                // Check spacing: is there enough text distance from any already-placed image?
                let tooClose = false;
                for (const ph of placedHeights) {
                    if (Math.abs(heightAtImage - ph) < minSpacing) {
                        const priorityOverride = candidate.priority * layoutKnobs.priorityBias;
                        if (priorityOverride < 0.7) {
                            tooClose = true;
                            break;
                        }
                    }
                }
                if (tooClose) {
                    committedSkips.add(candidate.streamIndex);
                    continue;
                }

                // Score the placement (alignment + size)
                const pixelsSince = placedHeights.length === 0
                    ? 10000
                    : Math.max(0, heightAtImage - Math.max(...placedHeights.filter(h => h <= heightAtImage)));

                const decision = scoreImageCandidate(
                    candidate, viewportWidth, viewportHeight,
                    pixelsSince, recentAlignments, minSpacing
                );

                if (decision.place) {
                    const placement = {
                        alignment: decision.alignment,
                        widthPercent: decision.widthPercent,
                        score: decision.score,
                    };
                    placedAt[candidate.streamIndex] = placement;
                    committedPlacements[candidate.streamIndex] = placement;
                    placedHeights.push(heightAtImage);
                    recentAlignments.unshift(decision.alignment);
                    if (recentAlignments.length > 5) recentAlignments.pop();
                } else {
                    committedSkips.add(candidate.streamIndex);
                }
            }

            // ── Validation: ensure minimum full-width text lines between images ──
            // Text wrapping beside a floated image is NOT full-width.
            // After placing a float, subtract the float's estimated height
            // so wrapped text doesn't count toward the minimum.
            let fullWidthTextHeight = 10000; // start high so first image can place
            let floatHeightRemaining = 0;    // estimated px of active float still to clear

            for (let i = 0; i < contentStream.length; i++) {
                const item = contentStream[i];
                if (item.type === 'text' || item.type === 'system') {
                    const h = estimateTextHeight(item.text, viewportWidth);
                    if (floatHeightRemaining > 0) {
                        // Text is wrapping beside a float — doesn't count as full-width
                        floatHeightRemaining -= h;
                    } else {
                        fullWidthTextHeight += h;
                    }
                } else if (item.type === 'image' && placedAt[i]) {
                    if (fullWidthTextHeight < minTextHeightBeforeImage) {
                        delete placedAt[i];
                        // Don't commit this skip — on resize it might fit
                    } else {
                        fullWidthTextHeight = 0;
                        // If this is a floated image, estimate its rendered height
                        // so subsequent wrapped text doesn't count as full-width
                        const placement = placedAt[i];
                        if (placement.alignment !== 'center') {
                            const imgW = item.width || 400;
                            const imgH = item.height || 300;
                            const renderedWidth = viewportWidth * placement.widthPercent / 100;
                            const renderedHeight = (imgH / imgW) * renderedWidth;
                            floatHeightRemaining = renderedHeight;
                        }
                    }
                }
            }

            // ── Build final render list in stream order ──

            const renderList = [];
            for (let i = 0; i < contentStream.length; i++) {
                const item = contentStream[i];

                if (item.type === 'text') {
                    renderList.push({ type: 'text', text: item.text, streamIndex: i });
                } else if (item.type === 'system') {
                    renderList.push({ type: 'system', text: item.text, streamIndex: i });
                } else if (item.type === 'image' && placedAt[i]) {
                    const p = placedAt[i];
                    const iw = item.width || 400;
                    const ih = item.height || 300;
                    renderList.push({
                        type: 'image', src: item.src, caption: item.caption,
                        priority: item.priority,
                        aspectRatio: iw / ih,
                        alignment: p.alignment,
                        widthPercent: p.widthPercent,
                        score: p.score,
                        streamIndex: i
                    });
                }
            }

            return renderList;
        }

        function scoreImageCandidate(image, vpWidth, vpHeight, pixelsSince, recentAligns, minSpacing) {
            const priority = image.priority || 0.5;

            // Spacing gate
            if (pixelsSince < minSpacing) {
                const priorityOverride = priority * layoutKnobs.priorityBias;
                if (priorityOverride < 0.7) {
                    return { place: false };
                }
            }

            // Image aspect ratio (width/height). >1 = landscape, <1 = portrait, ~1 = square
            const imgW = image.width || 400;
            const imgH = image.height || 300;
            const aspectRatio = imgW / imgH;

            // Candidate alignments
            const alignments = vpWidth < 500 ? ['center'] : ['left', 'right', 'center'];

            // Size categories with width fractions
            const sizes = [
                { name: 'small',  center: 0.35, side: 0.22 },
                { name: 'medium', center: 0.50, side: 0.33 },
                { name: 'large',  center: 0.70, side: 0.42 },
            ];

            let bestScore = -1;
            let bestAlignment = 'center';
            let bestWidthPercent = 50;

            for (const alignment of alignments) {
                for (const size of sizes) {
                    const wf = alignment === 'center' ? size.center : size.side;
                    const imageWidth = wf * vpWidth;

                    // Hard constraint: floated images must leave >= 150px for text
                    if (alignment !== 'center') {
                        const remaining = vpWidth - imageWidth - 40;
                        if (remaining < 150) continue;
                    }

                    let score = 0.5;

                    // 1. Spacing — more text since last image → higher score
                    const spacingNorm = Math.min(pixelsSince / 600, 1.0);
                    score += spacingNorm * 0.3;

                    // 2. Size appropriateness
                    const sizeValues = { small: 0.0, medium: 0.5, large: 1.0 };
                    score -= Math.abs(sizeValues[size.name] - layoutKnobs.prominence) * 0.2;

                    // 3. Variety — penalise repeating alignment
                    score -= computeVarietyPenalty(alignment, recentAligns) * layoutKnobs.variety * 0.3;

                    // 4. Priority bonus
                    score += priority * layoutKnobs.priorityBias * 0.2;

                    // 5. Viewport-aware adjustments
                    if (vpWidth < 600) {
                        if (alignment === 'center') score += 0.1;
                        if (size.name === 'large') score -= 0.15;
                    } else if (vpWidth > 1200) {
                        if (alignment !== 'center') score += 0.05;
                    }

                    // 6. Priority + aspect ratio driven template selection
                    //    Center (full text break) requires BOTH high priority AND wide aspect.
                    //    Side floats (text wraps around) are the default for everything else.
                    if (alignment === 'center') {
                        // Center needs both high priority and landscape orientation
                        const priorityFit = (priority - 0.75) * 0.3;  // only positive above 0.75
                        const shapeFit = (aspectRatio - 1.3) * 0.2;   // only positive for wide images
                        score += priorityFit + shapeFit;
                        // Non-wide images get an additional center penalty
                        if (aspectRatio < 1.2) score -= 0.15;
                    } else {
                        // Side floats are the workhorse layout — base bonus
                        score += 0.1;
                        // Tall images are especially good as side floats
                        if (aspectRatio < 0.8) score += 0.1;
                        // Square images work well too
                        if (aspectRatio >= 0.8 && aspectRatio <= 1.3) score += 0.05;
                    }

                    if (score > bestScore) {
                        bestScore = score;
                        bestAlignment = alignment;
                        bestWidthPercent = Math.round(wf * 100);
                    }
                }
            }

            const skipThreshold = 0.3 - (priority * layoutKnobs.priorityBias * 0.2);
            if (bestScore < skipThreshold) {
                return { place: false };
            }

            return { place: true, alignment: bestAlignment, widthPercent: bestWidthPercent, score: bestScore };
        }

        function computeVarietyPenalty(alignment, recentAligns) {
            if (recentAligns.length === 0) return 0;

            let penalty = 0;
            if (recentAligns[0] === alignment) penalty += 0.6;
            if (recentAligns.length > 1 && recentAligns[1] === alignment) penalty += 0.3;
            const sameCount = recentAligns.filter(a => a === alignment).length;
            penalty += sameCount * 0.1;

            return Math.min(penalty, 1.0);
        }

        function estimateTextHeight(text, viewportWidth) {
            // Rough estimate: ~8px avg char width, line-height ~24px
            const avgCharWidth = 8.5;
            const lineHeight = 24;
            const paragraphMargin = 19; // 0.8em at ~24px
            const contentWidth = Math.max(viewportWidth - 40, 200); // account for padding
            const charsPerLine = Math.max(1, Math.floor(contentWidth / avgCharWidth));
            const lineCount = Math.max(1, Math.ceil(text.length / charsPerLine));
            return lineCount * lineHeight + paragraphMargin;
        }

        // ─── DOM creation for render items ───

        function createElementForItem(item) {
            if (item.type === 'text') {
                const p = document.createElement('p');
                p.style.margin = '0 0 0.8em 0';
                p.textContent = item.text;
                p.dataset.streamIndex = item.streamIndex;
                return p;

            } else if (item.type === 'system') {
                const line = document.createElement('div');
                line.className = 'output-line new-output';
                line.textContent = item.text;
                line.dataset.streamIndex = item.streamIndex;
                return line;

            } else if (item.type === 'image') {
                const figure = document.createElement('figure');
                figure.style.margin = '0';
                figure.style.padding = '0';
                figure.style.width = item.widthPercent + '%';
                figure.style.maxWidth = '100%';
                figure.style.lineHeight = '0';
                figure.dataset.streamIndex = item.streamIndex;

                const img = document.createElement('img');
                img.src = item.src;
                img.className = 'console-image';
                img.style.width = '100%';
                img.style.height = 'auto';
                img.style.display = 'block';
                // Don't let images exceed the visible area
                const statusBarH = statusBar.style.display === 'none' ? 0 : statusBar.offsetHeight;
                const maxImgHeight = window.innerHeight - statusBarH - 40;
                img.style.maxHeight = Math.max(100, maxImgHeight) + 'px';
                img.style.objectFit = 'contain';
                figure.appendChild(img);

                const cap = document.createElement('figcaption');
                const captionText = item.caption ? item.caption + ' | ' : '';
                const pri = (item.priority || 0).toFixed(2);
                const sc = (item.score || 0).toFixed(2);
                const ar = (item.aspectRatio || 1).toFixed(2);
                const shape = ar > 1.3 ? 'wide' : ar < 0.8 ? 'tall' : 'sq';
                cap.textContent = `${captionText}pri:${pri} score:${sc} ${item.alignment} ${item.widthPercent}% ${shape}(${ar})`;
                cap.style.textAlign = 'center';
                cap.style.fontSize = '0.75em';
                cap.style.opacity = '0.6';
                cap.style.padding = '4px 0';
                cap.style.lineHeight = '1.4';
                cap.style.fontFamily = 'monospace';
                figure.appendChild(cap);

                if (item.alignment === 'center') {
                    figure.style.display = 'block';
                    figure.style.marginLeft = 'auto';
                    figure.style.marginRight = 'auto';
                    figure.style.marginTop = '20px';
                    figure.style.marginBottom = '20px';
                    figure.style.clear = 'both';
                } else {
                    figure.style.float = item.alignment;
                    if (item.alignment === 'left') {
                        figure.style.margin = '10px 30px 15px 0';
                    } else {
                        figure.style.margin = '10px 0 15px 26px';
                    }
                }

                return figure;
            }

            return null;
        }

        // ─── Knob control from Swift ───

        function setLayoutKnob(name, value) {
            const clamped = Math.max(0, Math.min(1, value));
            const key = name.toLowerCase();
            if (key === 'density') layoutKnobs.density = clamped;
            else if (key === 'prominence') layoutKnobs.prominence = clamped;
            else if (key === 'variety') layoutKnobs.variety = clamped;
            else if (key === 'priority' || key === 'prioritybias') layoutKnobs.priorityBias = clamped;
            else if (key === 'textbefore') layoutKnobs.textBefore = clamped;

            // Re-layout with new knobs — full rescore
            renderLayout(true);
        }

        function getLayoutKnobs() {
            return JSON.stringify(layoutKnobs);
        }

        // ═══════════════════════════════════════════════════
        // Resize → debounced re-layout
        // ═══════════════════════════════════════════════════

        window.addEventListener('resize', function() {
            if (resizeDebounceTimer) clearTimeout(resizeDebounceTimer);
            resizeDebounceTimer = setTimeout(() => {
                renderLayout(true); // full rescore on resize
            }, 150);
        });

        // ═══════════════════════════════════════════════════
        // Scrolling helpers
        // ═══════════════════════════════════════════════════

        function scrollToBottom() {
            const scrollContainer = document.getElementById('scroll-container');
            if (scrollContainer) {
                scrollContainer.scrollTo({ top: scrollContainer.scrollHeight, behavior: 'smooth' });
            }
        }

        function autoResizeTextArea() {
            input.style.height = 'auto';
            input.style.height = input.scrollHeight + 'px';
            scrollToBottom();
        }

        // ═══════════════════════════════════════════════════
        // Prompt
        // ═══════════════════════════════════════════════════

        function showPrompt() {
            shouldMarkOldOnNextOutput = true;
            hidePrompt();

            const outputContainer = document.getElementById('output');

            const inputContainer = document.createElement('span');
            inputContainer.id = 'input-container';
            inputContainer.className = 'new-output';
            inputContainer.style.display = 'inline';

            const promptSpan = document.createElement('span');
            promptSpan.className = 'flowing-prompt';
            promptSpan.textContent = '>';
            promptSpan.style.marginRight = '5px';

            const inputSpan = document.createElement('span');
            inputSpan.id = 'flowing-input';
            inputSpan.className = 'flowing-input';
            inputSpan.contentEditable = true;
            inputSpan.style.outline = 'none';
            inputSpan.style.minWidth = '1px';
            inputSpan.style.display = 'inline';
            inputSpan.style.whiteSpace = 'pre-wrap';

            inputContainer.appendChild(promptSpan);
            inputContainer.appendChild(inputSpan);

            outputContainer.appendChild(inputContainer);

            const inputLine = document.getElementById('input-line');
            inputLine.style.display = 'none';

            setupFlowingInputHandlers(inputSpan);

            inputSpan.focus();
            scrollPromptIntoView();
        }

        function setupFlowingInputHandlers(inputSpan) {
            inputSpan.addEventListener('keydown', function(e) {
                if (menuMode) {
                    handleMenuKeydown(e);
                    return;
                }

                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    const userText = inputSpan.textContent;

                    if (userText.trim()) {
                        const inputContainer = document.getElementById('input-container');
                        if (inputContainer) {
                            inputContainer.remove();
                        }
                        window.webkit.messageHandlers.consoleInput.postMessage(userText);
                    } else {
                        inputSpan.textContent = '';
                        inputSpan.focus();
                    }
                }
            });

            inputSpan.addEventListener('input', function() {
                hideError();
            });
        }

        function hidePrompt() {
            const inputContainer = document.getElementById('input-container');
            if (inputContainer) {
                inputContainer.remove();
            }

            const existingPromptSpan = document.getElementById('prompt-span');
            if (existingPromptSpan) {
                existingPromptSpan.remove();
            }

            const inputLine = document.getElementById('input-line');
            if (inputLine) {
                inputLine.style.display = 'none';
            }
        }

        // ═══════════════════════════════════════════════════
        // Errors
        // ═══════════════════════════════════════════════════

        function showError(message) {
            setTimeout(() => {
                const outputContainer = document.getElementById('output');

                const existingError = document.getElementById('flowing-error');
                if (existingError) {
                    existingError.remove();
                }

                const errorLine = document.createElement('div');
                errorLine.id = 'flowing-error';
                errorLine.className = 'output-line new-output';
                errorLine.textContent = message;

                errorLine.style.color = getComputedStyle(document.getElementById('error-message')).color;
                errorLine.style.fontStyle = getComputedStyle(document.getElementById('error-message')).fontStyle;
                errorLine.style.fontSize = getComputedStyle(document.getElementById('error-message')).fontSize;

                outputContainer.appendChild(errorLine);

                setTimeout(() => {
                    if (errorLine) {
                        errorLine.remove();
                    }
                }, 5000);

                scrollToBottom();
            }, 10);

            errorMessage.style.display = 'none';
        }

        function hideError() {
            errorMessage.style.display = 'none';

            const flowingError = document.getElementById('flowing-error');
            if (flowingError) {
                flowingError.remove();
            }
        }

        function scrollErrorIntoView() {
            if (errorMessage.style.display === 'none') return;

            const scrollContainer = document.getElementById('scroll-container');
            if (!scrollContainer) return;

            const errorRect = errorMessage.getBoundingClientRect();
            const viewportHeight = window.innerHeight;
            const statusBarHeight = statusBar.style.display === 'none' ? 0 : statusBar.offsetHeight;
            const availableHeight = viewportHeight - statusBarHeight;
            const buffer = 60;

            const errorTop = errorRect.top - statusBarHeight;
            const errorBottom = errorRect.bottom - statusBarHeight;

            if (errorBottom > availableHeight - buffer) {
                const scrollAmount = errorBottom - availableHeight + buffer + 20;
                scrollContainer.scrollBy(0, scrollAmount);
            } else if (errorTop < buffer) {
                const scrollAmount = buffer - errorTop;
                scrollContainer.scrollBy(0, -scrollAmount);
            }
        }

        function scrollPromptIntoView() {
            let inputElement = document.getElementById('input-container');
            const inputLine = document.getElementById('input-line');

            if (!inputElement && inputLine.style.display !== 'none') {
                inputElement = inputLine;
            }

            if (!inputElement) return;

            const scrollContainer = document.getElementById('scroll-container');
            if (!scrollContainer) return;

            const inputRect = inputElement.getBoundingClientRect();
            const viewportHeight = window.innerHeight;
            const statusBarHeight = statusBar.style.display === 'none' ? 0 : statusBar.offsetHeight;
            const availableHeight = viewportHeight - statusBarHeight;
            const buffer = 40;

            const inputTop = inputRect.top - statusBarHeight;
            const inputBottom = inputRect.bottom - statusBarHeight;

            if (inputBottom > availableHeight - buffer) {
                const scrollAmount = inputBottom - availableHeight + buffer + 20;
                scrollContainer.scrollBy(0, scrollAmount);
            } else if (inputTop < buffer) {
                const scrollAmount = buffer - inputTop;
                scrollContainer.scrollBy(0, -scrollAmount);
            }
        }

        // ═══════════════════════════════════════════════════
        // Status Bar
        // ═══════════════════════════════════════════════════

        function showStatusBar(lines) {
            statusBar.innerHTML = '';

            lines.forEach(line => {
                const lineDiv = document.createElement('div');
                lineDiv.className = 'status-line';

                line.regions.forEach(region => {
                    const regionSpan = document.createElement('span');
                    regionSpan.className = `status-region status-${region.alignment}`;
                    regionSpan.textContent = region.text;
                    lineDiv.appendChild(regionSpan);
                });

                statusBar.appendChild(lineDiv);
            });

            statusBar.style.display = 'block';
            updateContentPadding();
        }

        function hideStatusBar() {
            statusBar.style.display = 'none';
            updateContentPadding();
        }

        function updateContentPadding() {
            const content = document.getElementById('content');
            if (statusBar.style.display === 'none') {
                content.style.paddingTop = '20px';
            } else {
                const statusBarHeight = statusBar.offsetHeight;
                content.style.paddingTop = (statusBarHeight + 20) + 'px';
            }
        }

        // ═══════════════════════════════════════════════════
        // Input event listeners
        // ═══════════════════════════════════════════════════

        input.addEventListener('input', function() {
            autoResizeTextArea();
            hideError();
        });

        input.addEventListener('keydown', function(e) {
            if (menuMode) {
                handleMenuKeydown(e);
                return;
            }

            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                const userText = input.value;
                if (userText.trim()) {
                    window.webkit.messageHandlers.consoleInput.postMessage(userText);
                }
                input.value = '';
                input.style.height = 'auto';
                input.style.height = '1.4em';
            }
        });

        document.addEventListener('keydown', function(e) {
            if (menuMode) {
                handleMenuKeydown(e);
            }
        });

        // ═══════════════════════════════════════════════════
        // Menu system
        // ═══════════════════════════════════════════════════

        function handleMenuKeydown(e) {
            if (e.metaKey || e.ctrlKey) {
                return;
            }

            if (e.key === 'ArrowUp') {
                e.preventDefault();
                e.stopPropagation();
                navigateMenu('up');
            } else if (e.key === 'ArrowDown') {
                e.preventDefault();
                e.stopPropagation();
                navigateMenu('down');
            } else if (e.key === 'Enter') {
                e.preventDefault();
                e.stopPropagation();
                selectMenuItem();
            } else if (e.key === 'Escape') {
                e.preventDefault();
                e.stopPropagation();
                window.webkit.messageHandlers.menuAction.postMessage('CANCEL');
            }
        }

        function showMenu(data) {
            shouldMarkOldOnNextOutput = true;

            menuMode = true;
            currentMenuData = data;
            selectedIndex = 0;

            hidePrompt();

            const outputContainer = document.getElementById('output');
            outputContainer.appendChild(menuContainer);

            menuContainer.style.display = 'block';

            menuTitle.textContent = data.title;
            renderMenuItems();

            setTimeout(() => {
                adjustMenuWidth();
                scrollMenuIntoView();
            }, 50);
        }

        function adjustMenuWidth() {
            const outputContainer = document.getElementById('output');
            const images = Array.from(outputContainer.querySelectorAll('.console-image'));

            if (images.length === 0) {
                return;
            }

            menuContainer.style.marginLeft = '8px';
            menuContainer.style.marginRight = '8px';
        }

        function hideMenu() {
            menuMode = false;
            currentMenuData = null;
            selectedIndex = 0;

            menuContainer.style.width = '';
            menuContainer.style.marginLeft = '';
            menuContainer.style.marginRight = '';
            menuContainer.style.position = '';
            menuContainer.style.top = '';
            menuContainer.style.clear = '';

            menuContainer.style.display = 'none';

            const contentContainer = document.getElementById('content');
            contentContainer.appendChild(menuContainer);

            showPrompt();
        }

        function renderMenuItems() {
            if (!currentMenuData) return;

            menuItems.innerHTML = '';
            currentMenuData.items.forEach((item, index) => {
                const itemDiv = document.createElement('div');

                if (item === '') {
                    itemDiv.className = 'menu-spacer';
                    itemDiv.innerHTML = '&nbsp;';
                } else {
                    itemDiv.className = 'menu-item';
                    if (index === selectedIndex) {
                        itemDiv.classList.add('menu-selected');
                    }
                    itemDiv.textContent = item;
                }
                menuItems.appendChild(itemDiv);
            });
        }

        function navigateMenu(direction) {
            if (!currentMenuData) return;

            let newIndex = selectedIndex;

            if (direction === 'up') {
                do {
                    newIndex = Math.max(0, newIndex - 1);
                } while (newIndex > 0 && currentMenuData.items[newIndex] === '');
            } else if (direction === 'down') {
                do {
                    newIndex = Math.min(currentMenuData.items.length - 1, newIndex + 1);
                } while (newIndex < currentMenuData.items.length - 1 && currentMenuData.items[newIndex] === '');
            }

            selectedIndex = newIndex;
            renderMenuItems();

            scrollSelectedItemIntoView();
        }

        function selectMenuItem() {
            if (!currentMenuData) return;

            window.webkit.messageHandlers.menuAction.postMessage(`SELECT:${selectedIndex}`);
        }

        function scrollMenuIntoView() {
            if (!menuContainer || menuContainer.style.display === 'none') return;

            const scrollContainer = document.getElementById('scroll-container');
            if (!scrollContainer) return;

            const menuRect = menuContainer.getBoundingClientRect();
            const viewportHeight = window.innerHeight;
            const statusBarHeight = statusBar.style.display === 'none' ? 0 : statusBar.offsetHeight;
            const availableHeight = viewportHeight - statusBarHeight;
            const buffer = 20;

            const menuTop = menuRect.top - statusBarHeight;
            const menuBottom = menuRect.bottom - statusBarHeight;
            const menuHeight = menuBottom - menuTop;

            if (menuHeight <= availableHeight - (2 * buffer)) {
                if (menuBottom > availableHeight - buffer) {
                    const scrollAmount = menuBottom - availableHeight + buffer;
                    scrollContainer.scrollBy(0, scrollAmount);
                } else if (menuTop < buffer) {
                    const scrollAmount = buffer - menuTop;
                    scrollContainer.scrollBy(0, -scrollAmount);
                }
            } else {
                const selectedItem = menuItems.querySelector('.menu-selected');
                if (selectedItem) {
                    const itemRect = selectedItem.getBoundingClientRect();
                    const itemTop = itemRect.top - statusBarHeight;
                    const itemBottom = itemRect.bottom - statusBarHeight;

                    if (itemBottom > availableHeight - buffer) {
                        const scrollAmount = itemBottom - availableHeight + buffer;
                        scrollContainer.scrollBy(0, scrollAmount);
                    } else if (itemTop < buffer) {
                        const scrollAmount = buffer - itemTop;
                        scrollContainer.scrollBy(0, -scrollAmount);
                    }
                } else {
                    if (menuTop < buffer) {
                        const scrollAmount = buffer - menuTop;
                        scrollContainer.scrollBy(0, -scrollAmount);
                    }
                }
            }
        }

        function scrollSelectedItemIntoView() {
            if (!menuContainer || menuContainer.style.display === 'none') return;

            const scrollContainer = document.getElementById('scroll-container');
            const selectedItem = menuItems.querySelector('.menu-selected');
            if (!scrollContainer || !selectedItem) return;

            const itemRect = selectedItem.getBoundingClientRect();
            const menuRect = menuContainer.getBoundingClientRect();
            const viewportHeight = window.innerHeight;
            const statusBarHeight = statusBar.style.display === 'none' ? 0 : statusBar.offsetHeight;
            const availableHeight = viewportHeight - statusBarHeight;
            const buffer = 20;

            const itemTop = itemRect.top - statusBarHeight;
            const itemBottom = itemRect.bottom - statusBarHeight;
            const menuBottom = menuRect.bottom - statusBarHeight;

            if (itemBottom > availableHeight - buffer) {
                const menuBottomScrollAmount = menuBottom - availableHeight + buffer;
                const itemScrollAmount = itemBottom - availableHeight + buffer + 20;
                const scrollAmount = Math.max(menuBottomScrollAmount, itemScrollAmount);
                scrollContainer.scrollBy(0, scrollAmount);
            } else if (itemTop < buffer) {
                const scrollAmount = buffer - itemTop;
                scrollContainer.scrollBy(0, -scrollAmount);
            }
        }

        // ═══════════════════════════════════════════════════
        // Focus management
        // ═══════════════════════════════════════════════════

        window.addEventListener('load', function() {
            const flowingInput = document.getElementById('flowing-input');
            if (flowingInput) {
                flowingInput.focus();
            } else {
                input.focus();
            }
        });

        document.addEventListener('click', function() {
            const flowingInput = document.getElementById('flowing-input');
            if (flowingInput) {
                flowingInput.focus();
            } else {
                input.focus();
            }
        });

        // ═══════════════════════════════════════════════════
        // Expose functions to Swift
        // ═══════════════════════════════════════════════════

        window.pushText = pushText;
        window.pushImage = pushImage;
        window.pushSystem = pushSystem;
        window.addContent = addContent;
        window.addText = addText;
        window.addOutput = addOutput;
        window.clearOutput = clearOutput;
        window.clearContentStream = clearContentStream;
        window.setLayoutKnob = setLayoutKnob;
        window.getLayoutKnobs = getLayoutKnobs;
        window.renderLayout = renderLayout;
    </script>
</body>
</html>
