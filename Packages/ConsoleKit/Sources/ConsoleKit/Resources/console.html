<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="default.css">
</head>
<body>
    <div id="status-container">
        <div id="status-bar" style="display: none;"></div>
    </div>
    <div id="scroll-container">
        <div id="content">
            <div id="output"></div>
    <div id="menu-container" style="display: none;">
        <div id="menu-title"></div>
        <div id="menu-items"></div>
    </div>
    <div id="input-line" style="display: none;">
        <span id="prompt">></span>
        <textarea id="input" rows="1"></textarea>
    </div>
    <div id="error-message" style="display: none;"></div>
        </div>
    </div>

    <script>
        // Override console.log to send messages to Swift
        const originalConsoleLog = console.log;
        console.log = function(...args) {
            const message = args.map(arg =>
                typeof arg === 'object' ? JSON.stringify(arg) : String(arg)
            ).join(' ');

            if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.consoleLog) {
                window.webkit.messageHandlers.consoleLog.postMessage(message);
            }

            originalConsoleLog.apply(console, args);
        };

        const output = document.getElementById('output');
        const input = document.getElementById('input');
        const menuContainer = document.getElementById('menu-container');
        const menuTitle = document.getElementById('menu-title');
        const menuItems = document.getElementById('menu-items');
        const errorMessage = document.getElementById('error-message');
        const statusBar = document.getElementById('status-bar');

        let menuMode = false;
        let currentMenuData = null;
        let selectedIndex = 0;
        let shouldMarkOldOnNextOutput = false;

        // Layout state tracking
        let contentStreamContainer = null;
        let lastPlacedImage = null;
        let lastImageOutputHeight = 0;

        // ─── Line-based output (used by addOutput) ───

        function addOutput(text, className = '') {
            if (shouldMarkOldOnNextOutput) {
                markAllOutputAsOld();
                shouldMarkOldOnNextOutput = false;
            }

            const line = document.createElement('div');
            line.className = 'output-line new-output ' + className;
            line.textContent = text;
            output.appendChild(line);
            scrollToBottom();
        }

        // ─── Content stream (text + images via Swift scorer) ───

        function initializeContentStream() {
            if (!contentStreamContainer) {
                contentStreamContainer = document.createElement('div');
                contentStreamContainer.className = 'content-stream';
                contentStreamContainer.id = 'content-stream';
                contentStreamContainer.style.color = 'inherit';
                contentStreamContainer.style.fontFamily = 'inherit';
                contentStreamContainer.style.fontSize = 'inherit';
                contentStreamContainer.style.lineHeight = '1.6';
                contentStreamContainer.style.wordWrap = 'break-word';
                contentStreamContainer.style.overflow = 'hidden';
                output.appendChild(contentStreamContainer);
            }
        }

        function addText(text) {
            if (shouldMarkOldOnNextOutput) {
                markAllOutputAsOld();
                shouldMarkOldOnNextOutput = false;
            }

            initializeContentStream();

            if (text.trim()) {
                const textNode = document.createTextNode(text + ' ');
                contentStreamContainer.appendChild(textNode);
            }

            scrollToBottom();
        }

        function addTextAndGetState(text) {
            addText(text);
            return JSON.stringify(getLayoutState());
        }

        // Backward-compatible wrapper — text only, images routed through Swift scorer
        function addContent(text, image, caption) {
            addText(text || '');
        }

        function placeImageWithParams(src, alignment, widthPercent, caption) {
            initializeContentStream();

            const figure = document.createElement('figure');
            figure.style.margin = '0';
            figure.style.padding = '0';
            figure.style.width = widthPercent + '%';
            figure.style.maxWidth = '100%';
            figure.style.lineHeight = '0';

            const img = document.createElement('img');
            img.src = src;
            img.className = 'console-image';
            img.style.width = '100%';
            img.style.height = 'auto';
            img.style.display = 'block';

            figure.appendChild(img);

            if (caption && caption.trim()) {
                const cap = document.createElement('figcaption');
                cap.textContent = caption;
                cap.style.textAlign = 'center';
                cap.style.fontSize = '0.85em';
                cap.style.opacity = '0.7';
                cap.style.padding = '4px 0';
                cap.style.lineHeight = '1.4';
                figure.appendChild(cap);
            }

            if (alignment === 'center') {
                figure.style.display = 'block';
                figure.style.marginLeft = 'auto';
                figure.style.marginRight = 'auto';
                figure.style.marginTop = '20px';
                figure.style.marginBottom = '20px';
                figure.style.clear = 'both';
            } else {
                figure.style.float = alignment;
                if (alignment === 'left') {
                    figure.style.margin = '10px 20px 15px 0';
                } else {
                    figure.style.margin = '10px 0 15px 20px';
                }
            }

            contentStreamContainer.appendChild(figure);

            lastPlacedImage = img;
            lastImageOutputHeight = output.scrollHeight;

            scrollToShowImage(img);

            return JSON.stringify(getLayoutState());
        }

        function getLayoutState() {
            const viewportWidth = window.innerWidth;
            const viewportHeight = window.innerHeight;
            const outputHeight = output ? output.scrollHeight : 0;

            let pixelsSinceLastImage = 10000;
            if (lastImageOutputHeight > 0) {
                pixelsSinceLastImage = Math.max(0, outputHeight - lastImageOutputHeight);
            }

            return {
                viewportWidth: viewportWidth,
                viewportHeight: viewportHeight,
                pixelsSinceLastImage: pixelsSinceLastImage,
                outputHeight: outputHeight
            };
        }

        function clearOutput() {
            output.innerHTML = '';
            contentStreamContainer = null;
            lastPlacedImage = null;
            lastImageOutputHeight = 0;
        }

        // ─── Scrolling helpers ───

        function scrollToShowImage(imageElement) {
            setTimeout(() => {
                const imageRect = imageElement.getBoundingClientRect();
                const viewportHeight = window.innerHeight;
                const scrollContainer = document.getElementById('scroll-container');

                const imageTop = imageElement.offsetTop;
                const imageBottom = imageTop + imageElement.offsetHeight;
                const bottomMargin = 20;

                const idealScrollTop = imageBottom + bottomMargin - viewportHeight;
                const imageTopInViewport = imageTop - idealScrollTop;
                const topPadding = 20;

                if (imageTopInViewport >= topPadding) {
                    scrollContainer.scrollTop = idealScrollTop;
                } else {
                    scrollContainer.scrollTop = imageTop - topPadding;
                }
            }, 50);
        }

        function markAllOutputAsOld() {
            const allOutputLines = output.querySelectorAll('.output-line');
            allOutputLines.forEach(line => {
                line.classList.remove('new-output');
                line.classList.add('old-output');
            });
        }

        function scrollToBottom() {
            window.scrollTo(0, document.body.scrollHeight);
        }

        function autoResizeTextArea() {
            input.style.height = 'auto';
            input.style.height = input.scrollHeight + 'px';
            scrollToBottom();
        }

        // ─── Prompt ───

        function showPrompt() {
            shouldMarkOldOnNextOutput = true;
            hidePrompt();

            const outputContainer = document.getElementById('output');

            const inputContainer = document.createElement('span');
            inputContainer.id = 'input-container';
            inputContainer.className = 'new-output';
            inputContainer.style.display = 'inline';

            const promptSpan = document.createElement('span');
            promptSpan.className = 'flowing-prompt';
            promptSpan.textContent = '>';
            promptSpan.style.marginRight = '5px';

            const inputSpan = document.createElement('span');
            inputSpan.id = 'flowing-input';
            inputSpan.className = 'flowing-input';
            inputSpan.contentEditable = true;
            inputSpan.style.outline = 'none';
            inputSpan.style.minWidth = '1px';
            inputSpan.style.display = 'inline';
            inputSpan.style.whiteSpace = 'pre-wrap';

            inputContainer.appendChild(promptSpan);
            inputContainer.appendChild(inputSpan);

            outputContainer.appendChild(inputContainer);

            const inputLine = document.getElementById('input-line');
            inputLine.style.display = 'none';

            setupFlowingInputHandlers(inputSpan);

            inputSpan.focus();
            scrollPromptIntoView();
        }

        function setupFlowingInputHandlers(inputSpan) {
            inputSpan.addEventListener('keydown', function(e) {
                if (menuMode) {
                    handleMenuKeydown(e);
                    return;
                }

                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    const userText = inputSpan.textContent;

                    if (userText.trim()) {
                        const inputContainer = document.getElementById('input-container');
                        if (inputContainer) {
                            inputContainer.remove();
                        }
                        window.webkit.messageHandlers.consoleInput.postMessage(userText);
                    } else {
                        inputSpan.textContent = '';
                        inputSpan.focus();
                    }
                }
            });

            inputSpan.addEventListener('input', function() {
                hideError();
            });
        }

        function hidePrompt() {
            const inputContainer = document.getElementById('input-container');
            if (inputContainer) {
                inputContainer.remove();
            }

            const existingPromptSpan = document.getElementById('prompt-span');
            if (existingPromptSpan) {
                existingPromptSpan.remove();
            }

            const inputLine = document.getElementById('input-line');
            if (inputLine) {
                inputLine.style.display = 'none';
            }
        }

        // ─── Errors ───

        function showError(message) {
            setTimeout(() => {
                const outputContainer = document.getElementById('output');

                const existingError = document.getElementById('flowing-error');
                if (existingError) {
                    existingError.remove();
                }

                const errorLine = document.createElement('div');
                errorLine.id = 'flowing-error';
                errorLine.className = 'output-line new-output';
                errorLine.textContent = message;

                errorLine.style.color = getComputedStyle(document.getElementById('error-message')).color;
                errorLine.style.fontStyle = getComputedStyle(document.getElementById('error-message')).fontStyle;
                errorLine.style.fontSize = getComputedStyle(document.getElementById('error-message')).fontSize;

                outputContainer.appendChild(errorLine);

                setTimeout(() => {
                    if (errorLine) {
                        errorLine.remove();
                    }
                }, 5000);

                scrollToBottom();
            }, 10);

            errorMessage.style.display = 'none';
        }

        function hideError() {
            errorMessage.style.display = 'none';

            const flowingError = document.getElementById('flowing-error');
            if (flowingError) {
                flowingError.remove();
            }
        }

        function scrollErrorIntoView() {
            if (errorMessage.style.display === 'none') return;

            const scrollContainer = document.getElementById('scroll-container');
            if (!scrollContainer) return;

            const errorRect = errorMessage.getBoundingClientRect();
            const viewportHeight = window.innerHeight;
            const statusBarHeight = statusBar.style.display === 'none' ? 0 : statusBar.offsetHeight;
            const availableHeight = viewportHeight - statusBarHeight;
            const buffer = 60;

            const errorTop = errorRect.top - statusBarHeight;
            const errorBottom = errorRect.bottom - statusBarHeight;

            if (errorBottom > availableHeight - buffer) {
                const scrollAmount = errorBottom - availableHeight + buffer + 20;
                scrollContainer.scrollBy(0, scrollAmount);
            } else if (errorTop < buffer) {
                const scrollAmount = buffer - errorTop;
                scrollContainer.scrollBy(0, -scrollAmount);
            }
        }

        function scrollPromptIntoView() {
            let inputElement = document.getElementById('input-container');
            const inputLine = document.getElementById('input-line');

            if (!inputElement && inputLine.style.display !== 'none') {
                inputElement = inputLine;
            }

            if (!inputElement) return;

            const scrollContainer = document.getElementById('scroll-container');
            if (!scrollContainer) return;

            const inputRect = inputElement.getBoundingClientRect();
            const viewportHeight = window.innerHeight;
            const statusBarHeight = statusBar.style.display === 'none' ? 0 : statusBar.offsetHeight;
            const availableHeight = viewportHeight - statusBarHeight;
            const buffer = 40;

            const inputTop = inputRect.top - statusBarHeight;
            const inputBottom = inputRect.bottom - statusBarHeight;

            if (inputBottom > availableHeight - buffer) {
                const scrollAmount = inputBottom - availableHeight + buffer + 20;
                scrollContainer.scrollBy(0, scrollAmount);
            } else if (inputTop < buffer) {
                const scrollAmount = buffer - inputTop;
                scrollContainer.scrollBy(0, -scrollAmount);
            }
        }

        // ─── Status Bar ───

        function showStatusBar(lines) {
            statusBar.innerHTML = '';

            lines.forEach(line => {
                const lineDiv = document.createElement('div');
                lineDiv.className = 'status-line';

                line.regions.forEach(region => {
                    const regionSpan = document.createElement('span');
                    regionSpan.className = `status-region status-${region.alignment}`;
                    regionSpan.textContent = region.text;
                    lineDiv.appendChild(regionSpan);
                });

                statusBar.appendChild(lineDiv);
            });

            statusBar.style.display = 'block';
            updateContentPadding();
        }

        function hideStatusBar() {
            statusBar.style.display = 'none';
            updateContentPadding();
        }

        function updateContentPadding() {
            const content = document.getElementById('content');
            if (statusBar.style.display === 'none') {
                content.style.paddingTop = '20px';
            } else {
                const statusBarHeight = statusBar.offsetHeight;
                content.style.paddingTop = (statusBarHeight + 20) + 'px';
            }
        }

        // ─── Input event listeners ───

        input.addEventListener('input', function() {
            autoResizeTextArea();
            hideError();
        });

        input.addEventListener('keydown', function(e) {
            if (menuMode) {
                handleMenuKeydown(e);
                return;
            }

            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                const userText = input.value;
                if (userText.trim()) {
                    window.webkit.messageHandlers.consoleInput.postMessage(userText);
                }
                input.value = '';
                input.style.height = 'auto';
                input.style.height = '1.4em';
            }
        });

        document.addEventListener('keydown', function(e) {
            if (menuMode) {
                handleMenuKeydown(e);
            }
        });

        // ─── Menu system ───

        function handleMenuKeydown(e) {
            if (e.metaKey || e.ctrlKey) {
                return;
            }

            if (e.key === 'ArrowUp') {
                e.preventDefault();
                e.stopPropagation();
                navigateMenu('up');
            } else if (e.key === 'ArrowDown') {
                e.preventDefault();
                e.stopPropagation();
                navigateMenu('down');
            } else if (e.key === 'Enter') {
                e.preventDefault();
                e.stopPropagation();
                selectMenuItem();
            } else if (e.key === 'Escape') {
                e.preventDefault();
                e.stopPropagation();
                window.webkit.messageHandlers.menuAction.postMessage('CANCEL');
            }
        }

        function showMenu(data) {
            shouldMarkOldOnNextOutput = true;

            menuMode = true;
            currentMenuData = data;
            selectedIndex = 0;

            hidePrompt();

            const outputContainer = document.getElementById('output');
            outputContainer.appendChild(menuContainer);

            menuContainer.style.display = 'block';

            menuTitle.textContent = data.title;
            renderMenuItems();

            setTimeout(() => {
                adjustMenuWidth();
                scrollMenuIntoView();
            }, 50);
        }

        function adjustMenuWidth() {
            const outputContainer = document.getElementById('output');
            const images = Array.from(outputContainer.querySelectorAll('.console-image'));

            if (images.length === 0) {
                return;
            }

            menuContainer.style.marginLeft = '8px';
            menuContainer.style.marginRight = '8px';
        }

        function hideMenu() {
            menuMode = false;
            currentMenuData = null;
            selectedIndex = 0;

            menuContainer.style.width = '';
            menuContainer.style.marginLeft = '';
            menuContainer.style.marginRight = '';
            menuContainer.style.position = '';
            menuContainer.style.top = '';
            menuContainer.style.clear = '';

            menuContainer.style.display = 'none';

            const contentContainer = document.getElementById('content');
            contentContainer.appendChild(menuContainer);

            showPrompt();
        }

        function renderMenuItems() {
            if (!currentMenuData) return;

            menuItems.innerHTML = '';
            currentMenuData.items.forEach((item, index) => {
                const itemDiv = document.createElement('div');

                if (item === '') {
                    itemDiv.className = 'menu-spacer';
                    itemDiv.innerHTML = '&nbsp;';
                } else {
                    itemDiv.className = 'menu-item';
                    if (index === selectedIndex) {
                        itemDiv.classList.add('menu-selected');
                    }
                    itemDiv.textContent = item;
                }
                menuItems.appendChild(itemDiv);
            });
        }

        function navigateMenu(direction) {
            if (!currentMenuData) return;

            let newIndex = selectedIndex;

            if (direction === 'up') {
                do {
                    newIndex = Math.max(0, newIndex - 1);
                } while (newIndex > 0 && currentMenuData.items[newIndex] === '');
            } else if (direction === 'down') {
                do {
                    newIndex = Math.min(currentMenuData.items.length - 1, newIndex + 1);
                } while (newIndex < currentMenuData.items.length - 1 && currentMenuData.items[newIndex] === '');
            }

            selectedIndex = newIndex;
            renderMenuItems();

            scrollSelectedItemIntoView();
        }

        function selectMenuItem() {
            if (!currentMenuData) return;

            window.webkit.messageHandlers.menuAction.postMessage(`SELECT:${selectedIndex}`);
        }

        function scrollMenuIntoView() {
            if (!menuContainer || menuContainer.style.display === 'none') return;

            const scrollContainer = document.getElementById('scroll-container');
            if (!scrollContainer) return;

            const menuRect = menuContainer.getBoundingClientRect();
            const viewportHeight = window.innerHeight;
            const statusBarHeight = statusBar.style.display === 'none' ? 0 : statusBar.offsetHeight;
            const availableHeight = viewportHeight - statusBarHeight;
            const buffer = 20;

            const menuTop = menuRect.top - statusBarHeight;
            const menuBottom = menuRect.bottom - statusBarHeight;
            const menuHeight = menuBottom - menuTop;

            if (menuHeight <= availableHeight - (2 * buffer)) {
                if (menuBottom > availableHeight - buffer) {
                    const scrollAmount = menuBottom - availableHeight + buffer;
                    scrollContainer.scrollBy(0, scrollAmount);
                } else if (menuTop < buffer) {
                    const scrollAmount = buffer - menuTop;
                    scrollContainer.scrollBy(0, -scrollAmount);
                }
            } else {
                const selectedItem = menuItems.querySelector('.menu-selected');
                if (selectedItem) {
                    const itemRect = selectedItem.getBoundingClientRect();
                    const itemTop = itemRect.top - statusBarHeight;
                    const itemBottom = itemRect.bottom - statusBarHeight;

                    if (itemBottom > availableHeight - buffer) {
                        const scrollAmount = itemBottom - availableHeight + buffer;
                        scrollContainer.scrollBy(0, scrollAmount);
                    } else if (itemTop < buffer) {
                        const scrollAmount = buffer - itemTop;
                        scrollContainer.scrollBy(0, -scrollAmount);
                    }
                } else {
                    if (menuTop < buffer) {
                        const scrollAmount = buffer - menuTop;
                        scrollContainer.scrollBy(0, -scrollAmount);
                    }
                }
            }
        }

        function scrollSelectedItemIntoView() {
            if (!menuContainer || menuContainer.style.display === 'none') return;

            const scrollContainer = document.getElementById('scroll-container');
            const selectedItem = menuItems.querySelector('.menu-selected');
            if (!scrollContainer || !selectedItem) return;

            const itemRect = selectedItem.getBoundingClientRect();
            const menuRect = menuContainer.getBoundingClientRect();
            const viewportHeight = window.innerHeight;
            const statusBarHeight = statusBar.style.display === 'none' ? 0 : statusBar.offsetHeight;
            const availableHeight = viewportHeight - statusBarHeight;
            const buffer = 20;

            const itemTop = itemRect.top - statusBarHeight;
            const itemBottom = itemRect.bottom - statusBarHeight;
            const menuBottom = menuRect.bottom - statusBarHeight;

            if (itemBottom > availableHeight - buffer) {
                const menuBottomScrollAmount = menuBottom - availableHeight + buffer;
                const itemScrollAmount = itemBottom - availableHeight + buffer + 20;
                const scrollAmount = Math.max(menuBottomScrollAmount, itemScrollAmount);
                scrollContainer.scrollBy(0, scrollAmount);
            } else if (itemTop < buffer) {
                const scrollAmount = buffer - itemTop;
                scrollContainer.scrollBy(0, -scrollAmount);
            }
        }

        // ─── Focus management ───

        window.addEventListener('load', function() {
            const flowingInput = document.getElementById('flowing-input');
            if (flowingInput) {
                flowingInput.focus();
            } else {
                input.focus();
            }
        });

        document.addEventListener('click', function() {
            const flowingInput = document.getElementById('flowing-input');
            if (flowingInput) {
                flowingInput.focus();
            } else {
                input.focus();
            }
        });

        // ─── Resize: report layout state to Swift ───

        window.addEventListener('resize', function() {
            if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.layoutState) {
                window.webkit.messageHandlers.layoutState.postMessage(JSON.stringify(getLayoutState()));
            }
        });

        // ─── Expose functions to Swift ───

        window.addContent = addContent;
        window.addText = addText;
        window.addTextAndGetState = addTextAndGetState;
        window.placeImageWithParams = placeImageWithParams;
        window.getLayoutState = getLayoutState;
        window.clearOutput = clearOutput;
    </script>
</body>
</html>
